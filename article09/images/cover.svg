<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- AI Agent with telescope -->
  <g transform="translate(450, 240)" filter="url(#glow)">
    <!-- Agent body -->
    <circle cx="0" cy="0" r="50" fill="#16213e" stroke="#00d9ff" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" fill="#00d9ff" font-size="14" font-family="sans-serif" font-weight="bold">Agent</text>
    
    <!-- Telescope -->
    <g transform="translate(60, -20)">
      <rect x="0" y="-8" width="60" height="16" rx="4" fill="#16213e" stroke="#ffd700" stroke-width="2"/>
      <polygon points="60,-12 75,0 60,12" fill="#ffd700" opacity="0.8"/>
      <line x1="-10" y1="0" x2="0" y2="0" stroke="#ffd700" stroke-width="2"/>
    </g>
    
    <!-- Platform icons as stars -->
    <g opacity="0.9">
      <!-- Twitter -->
      <circle cx="-200" cy="-100" r="20" fill="#16213e" stroke="#00d9ff" stroke-width="2"/>
      <text x="-200" y="-95" text-anchor="middle" fill="#00d9ff" font-size="8" font-family="sans-serif">X</text>
      <line x1="-180" y1="-90" x2="-60" y2="-30" stroke="#00d9ff" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
      
      <!-- Reddit -->
      <circle cx="200" cy="-100" r="20" fill="#16213e" stroke="#e94560" stroke-width="2"/>
      <text x="200" y="-95" text-anchor="middle" fill="#e94560" font-size="8" font-family="sans-serif">R</text>
      <line x1="180" y1="-90" x2="60" y2="-30" stroke="#e94560" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
      
      <!-- YouTube -->
      <circle cx="-220" cy="50" r="20" fill="#16213e" stroke="#ff6b6b" stroke-width="2"/>
      <text x="-220" y="55" text-anchor="middle" fill="#ff6b6b" font-size="8" font-family="sans-serif">YT</text>
      <line x1="-200" y1="50" x2="-50" y2="20" stroke="#ff6b6b" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
      
      <!-- GitHub -->
      <circle cx="220" cy="50" r="20" fill="#16213e" stroke="#00ff88" stroke-width="2"/>
      <text x="220" y="55" text-anchor="middle" fill="#00ff88" font-size="8" font-family="sans-serif">GH</text>
      <line x1="200" y1="50" x2="50" y2="20" stroke="#00ff88" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
      
      <!-- Bilibili -->
      <circle cx="-150" cy="130" r="18" fill="#16213e" stroke="#a855f7" stroke-width="2"/>
      <text x="-150" y="135" text-anchor="middle" fill="#a855f7" font-size="8" font-family="sans-serif">B</text>
      <line x1="-132" y1="120" x2="-35" y2="40" stroke="#a855f7" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
      
      <!-- Xiaohongshu -->
      <circle cx="150" cy="130" r="18" fill="#16213e" stroke="#ffd700" stroke-width="2"/>
      <text x="150" y="135" text-anchor="middle" fill="#ffd700" font-size="7" font-family="sans-serif">XHS</text>
      <line x1="132" y1="120" x2="35" y2="40" stroke="#ffd700" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
    </g>
    
    <!-- Zero cost badge -->
    <g transform="translate(0, 90)">
      <rect x="-60" y="0" width="120" height="30" rx="15" fill="#00ff88" opacity="0.9"/>
      <text x="0" y="20" text-anchor="middle" fill="#0f0f23" font-size="12" font-family="sans-serif" font-weight="bold">$0 API Cost</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="450" y="430" text-anchor="middle" fill="#fff" font-size="28" font-family="sans-serif" font-weight="bold" filter="url(#glow)">Agent-Reach</text>
  <text x="450" y="460" text-anchor="middle" fill="#00d9ff" font-size="16" font-family="sans-serif">全网信息获取 | 29K Star</text>
</svg>