<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="700" height="350" fill="url(#bg)"/>
  
  <!-- Grid -->
  <g stroke="#00f0ff" stroke-width="0.3" opacity="0.06">
    <line x1="50" y1="40" x2="50" y2="310"/><line x1="150" y1="40" x2="150" y2="310"/>
    <line x1="250" y1="40" x2="250" y2="310"/><line x1="350" y1="40" x2="350" y2="310"/>
    <line x1="450" y1="40" x2="450" y2="310"/><line x1="550" y1="40" x2="550" y2="310"/>
    <line x1="650" y1="40" x2="650" y2="310"/>
  </g>
  
  <!-- Growth line chart -->
  <polyline points="80,290 130,275 180,250 230,210 280,165 330,120 380,90 430,70 480,55 530,48 580,42 620,38" 
            fill="none" stroke="url(#gradient)" stroke-width="3" filter="url(#glow)"/>
  <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#7b2ff7"/>
    <stop offset="50%" style="stop-color:#00f0ff"/>
    <stop offset="100%" style="stop-color:#ff2d95"/>
  </linearGradient>
  
  <!-- Area fill -->
  <polygon points="80,290 130,275 180,250 230,210 280,165 330,120 380,90 430,70 480,55 530,48 580,42 620,38 620,310 80,310" 
            fill="url(#areaGrad)" opacity="0.15"/>
  <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0"/>
  </linearGradient>
  
  <!-- Data points -->
  <circle cx="80" cy="290" r="3" fill="#7b2ff7" filter="url(#glow)"/>
  <circle cx="180" cy="250" r="3" fill="#7b2ff7" filter="url(#glow)"/>
  <circle cx="280" cy="165" r="3" fill="#00f0ff" filter="url(#glow)"/>
  <circle cx="380" cy="90" r="4" fill="#00f0ff" filter="url(#glow)"/>
  <circle cx="480" cy="55" r="4" fill="#ff2d95" filter="url(#glow)"/>
  <circle cx="620" cy="38" r="5" fill="#ff2d95" filter="url(#glow)"/>
  
  <!-- Labels -->
  <text x="80" y="325" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">1月</text>
  <text x="180" y="325" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">2月</text>
  <text x="280" y="325" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">3月</text>
  <text x="380" y="325" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">4月</text>
  <text x="480" y="325" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">5月</text>
  <text x="580" y="325" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">6月</text>
  
  <!-- Annotations -->
  <rect x="440" y="20" width="140" height="40" rx="6" fill="#0f0f23" stroke="#ff2d95" stroke-width="1"/>
  <text x="510" y="36" fill="#ff2d95" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">24.8万星</text>
  <text x="510" y="50" fill="#ff2d95" font-size="8" text-anchor="middle" font-family="sans-serif">60天达成</text>
  
  <line x1="480" y1="60" x2="500" y2="48" stroke="#ff2d95" stroke-width="0.5" stroke-dasharray="3,3"/>
  
  <!-- Title -->
  <text x="350" y="25" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">OpenClaw 星标增长曲线（2026上半年）</text>
</svg>