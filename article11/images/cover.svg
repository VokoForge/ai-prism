<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d95;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff2d95;stop-opacity:0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g opacity="0.08" stroke="#00f0ff" stroke-width="0.5">
    <line x1="80" y1="50" x2="80" y2="360"/>
    <line x1="160" y1="50" x2="160" y2="360"/>
    <line x1="240" y1="50" x2="240" y2="360"/>
    <line x1="320" y1="50" x2="320" y2="360"/>
    <line x1="400" y1="50" x2="400" y2="360"/>
    <line x1="480" y1="50" x2="480" y2="360"/>
    <line x1="560" y1="50" x2="560" y2="360"/>
    <line x1="640" y1="50" x2="640" y2="360"/>
    <line x1="720" y1="50" x2="720" y2="360"/>
  </g>
  
  <!-- Star chart bars -->
  <!-- Linux bar -->
  <rect x="180" y="280" width="50" height="20" rx="2" fill="#555" opacity="0.6"/>
  <text x="205" y="275" fill="#888" font-size="10" text-anchor="middle" font-family="sans-serif">Linux</text>
  <text x="205" y="310" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">182K</text>
  
  <!-- React bar -->
  <rect x="260" y="260" width="50" height="40" rx="2" fill="#555" opacity="0.6"/>
  <text x="285" y="255" fill="#888" font-size="10" text-anchor="middle" font-family="sans-serif">React</text>
  <text x="285" y="310" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">231K</text>
  
  <!-- VS Code bar -->
  <rect x="340" y="245" width="50" height="55" rx="2" fill="#555" opacity="0.6"/>
  <text x="365" y="240" fill="#888" font-size="10" text-anchor="middle" font-family="sans-serif">VSCode</text>
  <text x="365" y="310" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">242K</text>
  
  <!-- OpenClaw bar - shooting up! -->
  <rect x="420" y="170" width="60" height="130" rx="3" fill="url(#rocket)" opacity="0.9" filter="url(#bigGlow)"/>
  <text x="450" y="162" fill="#00f0ff" font-size="12" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#neon)">OpenClaw</text>
  <text x="450" y="315" fill="#00f0ff" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#neon)">248K+</text>
  
  <!-- Rocket icon -->
  <g transform="translate(450,130)" filter="url(#neon)">
    <polygon points="0,-25 10,5 -10,5" fill="url(#rocket)"/>
    <rect x="-5" y="5" width="10" height="8" rx="1" fill="#7b2ff7"/>
    <!-- Flame -->
    <ellipse cx="0" cy="16" rx="4" ry="8" fill="#ff2d95" opacity="0.8"/>
    <ellipse cx="0" cy="14" rx="2" ry="5" fill="#ffcc00" opacity="0.9"/>
  </g>
  
  <!-- Speed lines -->
  <g stroke="#00f0ff" stroke-width="1" opacity="0.3">
    <line x1="400" y1="120" x2="370" y2="120"/>
    <line x1="410" y1="105" x2="385" y2="105"/>
    <line x1="395" y1="140" x2="375" y2="140"/>
  </g>
  
  <!-- Particles -->
  <circle cx="500" cy="200" r="2" fill="#00f0ff" opacity="0.5" filter="url(#neon)"/>
  <circle cx="520" cy="180" r="1.5" fill="#7b2ff7" opacity="0.4" filter="url(#neon)"/>
  <circle cx="490" cy="160" r="1" fill="#ff2d95" opacity="0.3" filter="url(#neon)"/>
  
  <!-- Title -->
  <text x="400" y="55" fill="#ffffff" font-size="22" font-weight="bold" text-anchor="middle" font-family="sans-serif">24.8万星！GitHub史上增长最快项目</text>
  <text x="400" y="80" fill="#00f0ff" font-size="14" text-anchor="middle" font-family="sans-serif" opacity="0.8">黄仁勋：「OpenClaw 就是下一个 Linux」</text>
  
  <!-- 60天标签 -->
  <rect x="600" y="140" width="120" height="30" rx="15" fill="none" stroke="#ff2d95" stroke-width="1.5" opacity="0.8"/>
  <text x="660" y="160" fill="#ff2d95" font-size="11" text-anchor="middle" font-family="sans-serif" filter="url(#neon)">60天 · 零到24万</text>
</svg>