<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a0c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="700" height="380" fill="url(#bg)"/>
  
  <text x="350" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle">OpenEnv 强化学习训练环</text>
  
  <!-- Circular flow -->
  <!-- Observation -->
  <rect x="270" y="50" width="160" height="45" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="350" y="68" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#06b6d4" text-anchor="middle">观察环境</text>
  <text x="350" y="84" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">摄像头 · 传感器 · 状态</text>
  
  <!-- Arrow down -->
  <text x="350" y="115" font-family="Arial, sans-serif" font-size="18" fill="#06b6d4" text-anchor="middle">&darr;</text>
  
  <!-- Policy -->
  <rect x="270" y="125" width="160" height="45" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="350" y="143" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#a855f7" text-anchor="middle">策略决策</text>
  <text x="350" y="159" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">神经网络 · 推理动作</text>
  
  <!-- Arrow left -->
  <text x="245" y="150" font-family="Arial, sans-serif" font-size="18" fill="#a855f7" text-anchor="middle">&larr;</text>
  
  <!-- Action -->
  <rect x="30" y="125" width="160" height="45" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="143" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f59e0b" text-anchor="middle">执行动作</text>
  <text x="110" y="159" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">键盘 · 鼠标 · API调用</text>
  
  <!-- Arrow down -->
  <text x="110" y="190" font-family="Arial, sans-serif" font-size="18" fill="#f59e0b" text-anchor="middle">&darr;</text>
  
  <!-- Environment -->
  <rect x="30" y="200" width="160" height="45" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="110" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#22c55e" text-anchor="middle">环境反馈</text>
  <text x="110" y="234" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">奖励/惩罚信号</text>
  
  <!-- Arrow right -->
  <text x="245" y="225" font-family="Arial, sans-serif" font-size="18" fill="#22c55e" text-anchor="middle">&rarr;</text>
  
  <!-- Learning -->
  <rect x="270" y="200" width="160" height="45" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="350" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">学习更新</text>
  <text x="350" y="234" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">PPO · 梯度下降优化</text>
  
  <!-- Arrow up to complete circle -->
  <text x="350" y="270" font-family="Arial, sans-serif" font-size="18" fill="#ef4444" text-anchor="middle">&uarr;</text>
  
  <!-- Right side info -->
  <text x="500" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">关键概念</text>
  
  <rect x="480" y="100" width="200" height="25" rx="3" fill="#1e293b"/>
  <text x="490" y="118" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b">奖励函数: 目标导向的行为塑造</text>
  
  <rect x="480" y="135" width="200" height="25" rx="3" fill="#1e293b"/>
  <text x="490" y="153" font-family="Arial, sans-serif" font-size="10" fill="#06b6d4">观察空间: 智能体看到的世界</text>
  
  <rect x="480" y="170" width="200" height="25" rx="3" fill="#1e293b"/>
  <text x="490" y="188" font-family="Arial, sans-serif" font-size="10" fill="#a855f7">动作空间: 智能体能做的事情</text>
  
  <rect x="480" y="205" width="200" height="25" rx="3" fill="#1e293b"/>
  <text x="490" y="223" font-family="Arial, sans-serif" font-size="10" fill="#ef4444">PPO算法: 避免策略崩溃的安全更新</text>
  
  <!-- Bottom -->
  <text x="350" y="310" font-family="Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">这个循环每秒运行成千上万次，</text>
  <text x="350" y="330" font-family="Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">直到智能体学会最优行为策略</text>
  
  <rect x="220" y="348" width="260" height="24" rx="4" fill="#0d2b1e"/>
  <text x="350" y="365" font-family="Arial, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">典型训练: 100万步 ≈ 优秀表现</text>
</svg>