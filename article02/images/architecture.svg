<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fetcherGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rendererGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="extractorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="formatterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc">Firecrawl 分层抓取架构</text>
  <text x="400" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">从原始网页到 LLM-ready 数据的流水线</text>

  <!-- Input: Raw Website -->
  <g transform="translate(120, 140)">
    <rect x="-90" y="-40" width="180" height="80" rx="12" fill="#334155" stroke="#475569" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#f8fafc">原始网页</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">HTML + CSS + JS</text>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">~150KB 杂乱数据</text>
  </g>

  <!-- Arrow to Fetcher -->
  <g transform="translate(230, 140)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#64748b" stroke-width="2"/>
    <polygon points="40,0 32,-5 32,5" fill="#64748b"/>
  </g>

  <!-- Step 1: Fetcher -->
  <g transform="translate(330, 140)">
    <rect x="-70" y="-35" width="140" height="70" rx="12" fill="url(#fetcherGrad)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Fetcher</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="rgba(255,255,255,0.85)">HTTP请求 + 重定向</text>
    <!-- Icon -->
    <circle cx="-50" cy="-20" r="10" fill="white" opacity="0.2"/>
    <text x="-50" y="-16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">1</text>
  </g>

  <!-- Arrow to Renderer -->
  <g transform="translate(420, 140)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <polygon points="40,0 32,-5 32,5" fill="#3b82f6" opacity="0.6"/>
  </g>

  <!-- Step 2: Renderer -->
  <g transform="translate(520, 140)">
    <rect x="-70" y="-35" width="140" height="70" rx="12" fill="url(#rendererGrad)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Renderer</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="rgba(255,255,255,0.85)">Playwright JS渲染</text>
    <!-- Icon -->
    <circle cx="-50" cy="-20" r="10" fill="white" opacity="0.2"/>
    <text x="-50" y="-16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">2</text>
  </g>

  <!-- Arrow to Extractor -->
  <g transform="translate(610, 140)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <polygon points="40,0 32,-5 32,5" fill="#8b5cf6" opacity="0.6"/>
  </g>

  <!-- Step 3: Extractor -->
  <g transform="translate(710, 140)">
    <rect x="-70" y="-35" width="140" height="70" rx="12" fill="url(#extractorGrad)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Extractor</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="rgba(255,255,255,0.85)">AI内容识别提取</text>
    <!-- Icon -->
    <circle cx="-50" cy="-20" r="10" fill="white" opacity="0.2"/>
    <text x="-50" y="-16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">3</text>
  </g>

  <!-- Down arrow to Formatter -->
  <g transform="translate(710, 195)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#10b981" stroke-width="2" opacity="0.6"/>
    <polygon points="0,50 -5,42 5,42" fill="#10b981" opacity="0.6"/>
  </g>

  <!-- Step 4: Formatter -->
  <g transform="translate(710, 290)">
    <rect x="-70" y="-35" width="140" height="70" rx="12" fill="url(#formatterGrad)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Formatter</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="rgba(255,255,255,0.85)">Markdown/JSON输出</text>
    <!-- Icon -->
    <circle cx="-50" cy="-20" r="10" fill="white" opacity="0.2"/>
    <text x="-50" y="-16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">4</text>
  </g>

  <!-- Left arrow to Output -->
  <g transform="translate(610, 290)">
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
    <polygon points="-40,0 -32,-5 -32,5" fill="#f59e0b" opacity="0.6"/>
  </g>

  <!-- Output: LLM-ready Data -->
  <g transform="translate(450, 290)">
    <rect x="-100" y="-40" width="200" height="80" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#strongGlow)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#34d399">LLM-ready Data</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Markdown + Metadata</text>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">~8KB 结构化数据</text>
  </g>

  <!-- Left arrow from Output back -->
  <g transform="translate(310, 290)">
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#64748b" stroke-width="2"/>
    <polygon points="-40,0 -32,-5 -32,5" fill="#64748b"/>
  </g>

  <!-- URL Queue (top) -->
  <g transform="translate(330, 290)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#475569" opacity="0.8"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0">URL Queue</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">任务调度</text>
  </g>

  <!-- Connection from URL Queue to Fetcher -->
  <g transform="translate(330, 240)">
    <line x1="0" y1="0" x2="0" y2="-65" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="0,-65 -4,-58 4,-58" fill="#475569"/>
  </g>

  <!-- Data flow indicators -->
  <circle cx="350" cy="140" r="3" fill="#3b82f6" opacity="0.8">
    <animate attributeName="cx" values="350;410;350" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="140" r="3" fill="#8b5cf6" opacity="0.8">
    <animate attributeName="cx" values="540;600;540" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="710" cy="230" r="3" fill="#10b981" opacity="0.8">
    <animate attributeName="cy" values="230;270;230" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Stats comparison box -->
  <g transform="translate(200, 420)">
    <rect x="-160" y="-40" width="320" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="-140" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">原始数据</text>
    <text x="-140" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ef4444">150KB</text>
    <text x="-140" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">HTML + 广告 + 脚本</text>
    
    <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#f59e0b">→</text>
    <text x="0" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#f59e0b">20:1</text>
    
    <text x="60" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">清洗后</text>
    <text x="60" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#34d399">8KB</text>
    <text x="60" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">纯净 Markdown</text>
  </g>

  <!-- Legend -->
  <g transform="translate(550, 420)">
    <rect x="0" y="-8" width="12" height="12" rx="3" fill="url(#fetcherGrad)"/>
    <text x="20" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Fetcher</text>
    <rect x="80" y="-8" width="12" height="12" rx="3" fill="url(#rendererGrad)"/>
    <text x="100" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Renderer</text>
    <rect x="170" y="-8" width="12" height="12" rx="3" fill="url(#extractorGrad)"/>
    <text x="190" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Extractor</text>
  </g>
</svg>