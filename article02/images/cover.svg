<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- Web grid background -->
  <g opacity="0.15">
    <line x1="100" y1="100" x2="800" y2="100" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="100" y1="200" x2="800" y2="200" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="100" y1="300" x2="800" y2="300" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="100" y1="400" x2="800" y2="400" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="200" y1="50" x2="200" y2="450" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="400" y1="50" x2="400" y2="450" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="600" y1="50" x2="600" y2="450" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="800" y1="50" x2="800" y2="450" stroke="#00d9ff" stroke-width="0.5"/>
  </g>
  
  <!-- Spider/Crawler -->
  <g transform="translate(450, 220)" filter="url(#glow)">
    <!-- Body -->
    <circle cx="0" cy="0" r="40" fill="#16213e" stroke="#00ff88" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" fill="#00ff88" font-size="12" font-family="sans-serif" font-weight="bold">F</text>
    
    <!-- Legs -->
    <line x1="-30" y1="-20" x2="-80" y2="-60" stroke="#00ff88" stroke-width="2" opacity="0.7"/>
    <line x1="30" y1="-20" x2="80" y2="-60" stroke="#00ff88" stroke-width="2" opacity="0.7"/>
    <line x1="-35" y1="0" x2="-90" y2="0" stroke="#00ff88" stroke-width="2" opacity="0.7"/>
    <line x1="35" y1="0" x2="90" y2="0" stroke="#00ff88" stroke-width="2" opacity="0.7"/>
    <line x1="-30" y1="20" x2="-80" y2="60" stroke="#00ff88" stroke-width="2" opacity="0.7"/>
    <line x1="30" y1="20" x2="80" y2="60" stroke="#00ff88" stroke-width="2" opacity="0.7"/>
    
    <!-- Data flow lines -->
    <line x1="-80" y1="-60" x2="-120" y2="-100" stroke="#ffd700" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="80" y1="-60" x2="120" y2="-100" stroke="#ffd700" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="-90" y1="0" x2="-130" y2="0" stroke="#ffd700" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="90" y1="0" x2="130" y2="0" stroke="#ffd700" stroke-width="2" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Data output -->
  <g transform="translate(450, 340)">
    <rect x="-100" y="0" width="200" height="50" rx="10" fill="#16213e" stroke="#ffd700" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="22" text-anchor="middle" fill="#ffd700" font-size="14" font-family="sans-serif" font-weight="bold">Markdown / JSON</text>
    <text x="0" y="40" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">结构化数据输出</text>
  </g>
  
  <!-- Messy input icons -->
  <g opacity="0.6">
    <rect x="150" y="120" width="60" height="40" rx="5" fill="#16213e" stroke="#e94560" stroke-width="1"/>
    <text x="180" y="145" text-anchor="middle" fill="#e94560" font-size="10" font-family="sans-serif">HTML</text>
    
    <rect x="250" y="100" width="60" height="40" rx="5" fill="#16213e" stroke="#e94560" stroke-width="1"/>
    <text x="280" y="125" text-anchor="middle" fill="#e94560" font-size="10" font-family="sans-serif">PDF</text>
    
    <rect x="580" y="100" width="60" height="40" rx="5" fill="#16213e" stroke="#e94560" stroke-width="1"/>
    <text x="610" y="125" text-anchor="middle" fill="#e94560" font-size="10" font-family="sans-serif">DOCX</text>
    
    <rect x="680" y="120" width="60" height="40" rx="5" fill="#16213e" stroke="#e94560" stroke-width="1"/>
    <text x="710" y="145" text-anchor="middle" fill="#e94560" font-size="10" font-family="sans-serif">PPT</text>
  </g>
  
  <!-- Title -->
  <text x="450" y="440" text-anchor="middle" fill="#fff" font-size="28" font-family="sans-serif" font-weight="bold" filter="url(#glow)">Firecrawl</text>
  <text x="450" y="470" text-anchor="middle" fill="#00ff88" font-size="16" font-family="sans-serif">网页数据基础设施 | 13万 Star</text>
</svg>