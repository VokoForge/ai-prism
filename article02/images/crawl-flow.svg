<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crawlGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="filterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc">Firecrawl 整站抓取流程</text>
  <text x="400" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Map + Crawl 智能抓取链路</text>

  <!-- Seed URL -->
  <g transform="translate(120, 130)">
    <rect x="-80" y="-30" width="160" height="60" rx="10" fill="#334155" stroke="#475569" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#f8fafc">种子 URL</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">docs.python.org/3/</text>
  </g>

  <!-- Arrow to Map -->
  <g transform="translate(220, 130)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#3b82f6" stroke-width="2"/>
    <polygon points="50,0 42,-5 42,5" fill="#3b82f6"/>
  </g>

  <!-- Map Phase -->
  <g transform="translate(350, 130)">
    <rect x="-80" y="-35" width="160" height="70" rx="12" fill="url(#mapGrad)" filter="url(#glow)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Map 阶段</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">发现所有有效链接</text>
    <!-- Step badge -->
    <circle cx="-65" cy="-20" r="12" fill="white" opacity="0.2"/>
    <text x="-65" y="-16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="white">1</text>
  </g>

  <!-- Discovered URLs list -->
  <g transform="translate(520, 130)">
    <rect x="-100" y="-50" width="200" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="-85" y="-30" font-family="monospace, 'Courier New'" font-size="9" fill="#34d399">发现链接:</text>
    <text x="-85" y="-12" font-family="monospace, 'Courier New'" font-size="8" fill="#94a3b8">/tutorial/</text>
    <text x="-85" y="2" font-family="monospace, 'Courier New'" font-size="8" fill="#94a3b8">/library/</text>
    <text x="-85" y="16" font-family="monospace, 'Courier New'" font-size="8" fill="#94a3b8">/reference/</text>
    <text x="-85" y="30" font-family="monospace, 'Courier New'" font-size="8" fill="#64748b">... 共 127 个</text>
  </g>

  <!-- Down arrow to Crawl -->
  <g transform="translate(350, 185)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="0,50 -5,42 5,42" fill="#3b82f6"/>
  </g>

  <!-- Crawl Phase -->
  <g transform="translate(350, 280)">
    <rect x="-80" y="-35" width="160" height="70" rx="12" fill="url(#crawlGrad)" filter="url(#glow)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Crawl 阶段</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">并行批量抓取</text>
    <!-- Step badge -->
    <circle cx="-65" cy="-20" r="12" fill="white" opacity="0.2"/>
    <text x="-65" y="-16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="white">2</text>
  </g>

  <!-- Arrow to Filter -->
  <g transform="translate(460, 280)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="50,0 42,-5 42,5" fill="#8b5cf6"/>
  </g>

  <!-- Filter Phase -->
  <g transform="translate(590, 280)">
    <rect x="-80" y="-35" width="160" height="70" rx="12" fill="url(#filterGrad)" filter="url(#glow)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">智能过滤</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">去重 + 排除 + 筛选</text>
    <!-- Step badge -->
    <circle cx="-65" cy="-20" r="12" fill="white" opacity="0.2"/>
    <text x="-65" y="-16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="white">3</text>
  </g>

  <!-- Filter details -->
  <g transform="translate(720, 280)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="0" y="-20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ef4444">排除: 23 个</text>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">404/广告/重复</text>
    <text x="0" y="15" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#34d399">保留: 50 个</text>
    <text x="0" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">高质量内容页</text>
  </g>

  <!-- Down arrow to Output -->
  <g transform="translate(350, 335)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="0,50 -5,42 5,42" fill="#8b5cf6"/>
  </g>

  <!-- Output -->
  <g transform="translate(350, 430)">
    <rect x="-120" y="-35" width="240" height="70" rx="12" fill="url(#outputGrad)" filter="url(#glow)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">结构化输出</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">Markdown + Metadata 数组</text>
    <!-- Step badge -->
    <circle cx="-100" cy="-20" r="12" fill="white" opacity="0.2"/>
    <text x="-100" y="-16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="white">4</text>
  </g>

  <!-- Side annotations -->
  <g transform="translate(120, 280)">
    <rect x="-90" y="-40" width="180" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="0" y="-20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#f8fafc" font-weight="bold">智能特性</text>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">自动处理 JS 渲染</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">无限滚动加载</text>
    <text x="0" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">反爬策略自动应对</text>
  </g>

  <!-- Connection from annotation to Crawl -->
  <g transform="translate(220, 280)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="80" cy="80" r="4" fill="#3b82f6" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="420" r="5" fill="#10b981" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="100" r="3" fill="#f59e0b" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Flow animation dots -->
  <circle cx="245" cy="130" r="3" fill="#3b82f6" opacity="0.8">
    <animate attributeName="cx" values="245;265;245" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="210" r="3" fill="#8b5cf6" opacity="0.8">
    <animate attributeName="cy" values="210;230;210" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="360" r="3" fill="#f59e0b" opacity="0.8">
    <animate attributeName="cy" values="360;380;360" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>