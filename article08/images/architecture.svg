<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <text x="400" y="40" text-anchor="middle" fill="#00d9ff" font-size="22" font-family="sans-serif" font-weight="bold">goose 架构概览</text>
  
  <!-- Core -->
  <circle cx="400" cy="200" r="70" fill="url(#nodeGrad)" stroke="#e94560" stroke-width="3"/>
  <text x="400" y="195" text-anchor="middle" fill="#fff" font-size="16" font-family="sans-serif" font-weight="bold">goose Core</text>
  <text x="400" y="215" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">Rust 引擎</text>
  
  <!-- Extensions ring -->
  <g transform="translate(400, 200)">
    <!-- GitHub -->
    <rect x="-180" y="-120" width="80" height="40" rx="8" fill="url(#nodeGrad)" stroke="#00d9ff" stroke-width="2"/>
    <text x="-140" y="-95" text-anchor="middle" fill="#00d9ff" font-size="11" font-family="sans-serif">GitHub</text>
    <line x1="-100" y1="-100" x2="-70" y2="-50" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- AWS -->
    <rect x="100" y="-120" width="80" height="40" rx="8" fill="url(#nodeGrad)" stroke="#ffd700" stroke-width="2"/>
    <text x="140" y="-95" text-anchor="middle" fill="#ffd700" font-size="11" font-family="sans-serif">AWS</text>
    <line x1="100" y1="-100" x2="70" y2="-50" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Slack -->
    <rect x="-220" y="20" width="80" height="40" rx="8" fill="url(#nodeGrad)" stroke="#00ff88" stroke-width="2"/>
    <text x="-180" y="45" text-anchor="middle" fill="#00ff88" font-size="11" font-family="sans-serif">Slack</text>
    <line x1="-140" y1="40" x2="-70" y2="30" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
    
    <!-- DB -->
    <rect x="140" y="20" width="80" height="40" rx="8" fill="url(#nodeGrad)" stroke="#e94560" stroke-width="2"/>
    <text x="180" y="45" text-anchor="middle" fill="#e94560" font-size="11" font-family="sans-serif">PostgreSQL</text>
    <line x1="140" y1="40" x2="70" y2="30" stroke="#e94560" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Search -->
    <rect x="-180" y="140" width="80" height="40" rx="8" fill="url(#nodeGrad)" stroke="#ff6b6b" stroke-width="2"/>
    <text x="-140" y="165" text-anchor="middle" fill="#ff6b6b" font-size="11" font-family="sans-serif">Google</text>
    <line x1="-100" y1="160" x2="-50" y2="130" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Files -->
    <rect x="100" y="140" width="80" height="40" rx="8" fill="url(#nodeGrad)" stroke="#a855f7" stroke-width="2"/>
    <text x="140" y="165" text-anchor="middle" fill="#a855f7" font-size="11" font-family="sans-serif">Files</text>
    <line x1="100" y1="160" x2="50" y2="130" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Models -->
  <text x="400" y="320" text-anchor="middle" fill="#888" font-size="12" font-family="sans-serif">支持的模型提供商</text>
  <g transform="translate(180, 340)">
    <rect x="0" y="0" width="70" height="30" rx="5" fill="#16213e" stroke="#00d9ff" stroke-width="1"/>
    <text x="35" y="20" text-anchor="middle" fill="#00d9ff" font-size="10" font-family="sans-serif">OpenAI</text>
  </g>
  <g transform="translate(270, 340)">
    <rect x="0" y="0" width="70" height="30" rx="5" fill="#16213e" stroke="#e94560" stroke-width="1"/>
    <text x="35" y="20" text-anchor="middle" fill="#e94560" font-size="10" font-family="sans-serif">Anthropic</text>
  </g>
  <g transform="translate(360, 340)">
    <rect x="0" y="0" width="70" height="30" rx="5" fill="#16213e" stroke="#ffd700" stroke-width="1"/>
    <text x="35" y="20" text-anchor="middle" fill="#ffd700" font-size="10" font-family="sans-serif">Google</text>
  </g>
  <g transform="translate(450, 340)">
    <rect x="0" y="0" width="70" height="30" rx="5" fill="#16213e" stroke="#00ff88" stroke-width="1"/>
    <text x="35" y="20" text-anchor="middle" fill="#00ff88" font-size="10" font-family="sans-serif">Ollama</text>
  </g>
  <g transform="translate(540, 340)">
    <rect x="0" y="0" width="70" height="30" rx="5" fill="#16213e" stroke="#ff6b6b" stroke-width="1"/>
    <text x="35" y="20" text-anchor="middle" fill="#ff6b6b" font-size="10" font-family="sans-serif">+11 更多</text>
  </g>
  
  <!-- Interfaces -->
  <text x="400" y="420" text-anchor="middle" fill="#888" font-size="12" font-family="sans-serif">三形态运行</text>
  <g transform="translate(250, 440)">
    <rect x="0" y="0" width="90" height="35" rx="5" fill="#e94560" opacity="0.8"/>
    <text x="45" y="22" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif" font-weight="bold">桌面应用</text>
  </g>
  <g transform="translate(360, 440)">
    <rect x="0" y="0" width="90" height="35" rx="5" fill="#e94560" opacity="0.8"/>
    <text x="45" y="22" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif" font-weight="bold">CLI</text>
  </g>
  <g transform="translate(470, 440)">
    <rect x="0" y="0" width="90" height="35" rx="5" fill="#e94560" opacity="0.8"/>
    <text x="45" y="22" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif" font-weight="bold">API</text>
  </g>
</svg>