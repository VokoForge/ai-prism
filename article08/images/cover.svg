<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- Swiss Army Knife concept -->
  <g transform="translate(450, 240)" filter="url(#glow)">
    <!-- Main body -->
    <rect x="-80" y="-30" width="160" height="60" rx="10" fill="#16213e" stroke="#e94560" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" fill="#e94560" font-size="16" font-family="sans-serif" font-weight="bold">goose</text>
    <text x="0" y="22" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif">Rust | Linux Foundation</text>
    
    <!-- Tools extending from knife -->
    <!-- Tool 1: Code -->
    <g transform="translate(-120, -50)">
      <rect x="0" y="0" width="50" height="35" rx="5" fill="#16213e" stroke="#00d9ff" stroke-width="2"/>
      <text x="25" y="22" text-anchor="middle" fill="#00d9ff" font-size="9" font-family="sans-serif">Code</text>
      <line x1="50" y1="17" x2="80" y2="10" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- Tool 2: Search -->
    <g transform="translate(70, -60)">
      <rect x="0" y="0" width="50" height="35" rx="5" fill="#16213e" stroke="#ffd700" stroke-width="2"/>
      <text x="25" y="22" text-anchor="middle" fill="#ffd700" font-size="9" font-family="sans-serif">Search</text>
      <line x1="0" y1="17" x2="-30" y2="0" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- Tool 3: GitHub -->
    <g transform="translate(-130, 20)">
      <rect x="0" y="0" width="55" height="35" rx="5" fill="#16213e" stroke="#00ff88" stroke-width="2"/>
      <text x="27" y="22" text-anchor="middle" fill="#00ff88" font-size="9" font-family="sans-serif">GitHub</text>
      <line x1="55" y1="17" x2="80" y2="0" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- Tool 4: Slack -->
    <g transform="translate(75, 30)">
      <rect x="0" y="0" width="50" height="35" rx="5" fill="#16213e" stroke="#a855f7" stroke-width="2"/>
      <text x="25" y="22" text-anchor="middle" fill="#a855f7" font-size="9" font-family="sans-serif">Slack</text>
      <line x1="0" y1="17" x2="-25" y2="0" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- Tool 5: DB -->
    <g transform="translate(-100, -90)">
      <rect x="0" y="0" width="40" height="30" rx="5" fill="#16213e" stroke="#ff6b6b" stroke-width="2"/>
      <text x="20" y="19" text-anchor="middle" fill="#ff6b6b" font-size="8" font-family="sans-serif">DB</text>
      <line x1="40" y1="15" x2="60" y2="-10" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- Tool 6: Cloud -->
    <g transform="translate(60, -90)">
      <rect x="0" y="0" width="50" height="30" rx="5" fill="#16213e" stroke="#00d9ff" stroke-width="2"/>
      <text x="25" y="19" text-anchor="middle" fill="#00d9ff" font-size="8" font-family="sans-serif">Cloud</text>
      <line x1="0" y1="15" x2="-20" y2="-10" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- MCP badge -->
    <g transform="translate(0, 70)">
      <rect x="-50" y="0" width="100" height="28" rx="14" fill="#e94560" opacity="0.9"/>
      <text x="0" y="19" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif" font-weight="bold">70+ MCP 扩展</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="450" y="430" text-anchor="middle" fill="#fff" font-size="28" font-family="sans-serif" font-weight="bold" filter="url(#glow)">goose</text>
  <text x="450" y="460" text-anchor="middle" fill="#e94560" font-size="16" font-family="sans-serif">通用 AI Agent | 49K Star</text>
</svg>