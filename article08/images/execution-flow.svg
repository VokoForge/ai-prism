<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="350" fill="url(#bgGrad)"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#00d9ff" font-size="20" font-family="sans-serif" font-weight="bold">goose 任务执行流程</text>
  
  <!-- Flow -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="url(#boxGrad)" stroke="#00d9ff" stroke-width="2"/>
    <text x="65" y="28" text-anchor="middle" fill="#00d9ff" font-size="12" font-family="sans-serif" font-weight="bold">用户输入</text>
    <text x="65" y="48" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">自然语言任务</text>
  </g>
  
  <text x="225" y="125" fill="#e94560" font-size="20">→</text>
  
  <g transform="translate(250, 80)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="url(#boxGrad)" stroke="#ffd700" stroke-width="2"/>
    <text x="65" y="28" text-anchor="middle" fill="#ffd700" font-size="12" font-family="sans-serif" font-weight="bold">任务分解</text>
    <text x="65" y="48" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Planner 拆解</text>
  </g>
  
  <text x="395" y="125" fill="#e94560" font-size="20">→</text>
  
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="url(#boxGrad)" stroke="#00ff88" stroke-width="2"/>
    <text x="65" y="28" text-anchor="middle" fill="#00ff88" font-size="12" font-family="sans-serif" font-weight="bold">并行执行</text>
    <text x="65" y="48" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Rust async</text>
  </g>
  
  <text x="565" y="125" fill="#e94560" font-size="20">→</text>
  
  <g transform="translate(590, 80)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="url(#boxGrad)" stroke="#e94560" stroke-width="2"/>
    <text x="65" y="28" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif" font-weight="bold">结果聚合</text>
    <text x="65" y="48" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Synthesizer</text>
  </g>
  
  <!-- Subtasks visualization -->
  <g transform="translate(250, 190)">
    <text x="65" y="0" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">分解示例</text>
    <rect x="0" y="15" width="120" height="25" rx="5" fill="#16213e" stroke="#00d9ff" stroke-width="1"/>
    <text x="60" y="32" text-anchor="middle" fill="#ccc" font-size="10" font-family="sans-serif">1. 查 GitHub issues</text>
    <rect x="0" y="50" width="120" height="25" rx="5" fill="#16213e" stroke="#ffd700" stroke-width="1"/>
    <text x="60" y="67" text-anchor="middle" fill="#ccc" font-size="10" font-family="sans-serif">2. 读代码文件</text>
    <rect x="0" y="85" width="120" height="25" rx="5" fill="#16213e" stroke="#00ff88" stroke-width="1"/>
    <text x="60" y="102" text-anchor="middle" fill="#ccc" font-size="10" font-family="sans-serif">3. 生成报告</text>
  </g>
  
  <!-- Parallel arrows -->
  <g transform="translate(420, 190)">
    <text x="65" y="0" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">并行执行</text>
    <line x1="20" y1="30" x2="20" y2="90" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="65" y1="30" x2="65" y2="90" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="110" y1="30" x2="110" y2="90" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="65" y="110" text-anchor="middle" fill="#00ff88" font-size="10" font-family="sans-serif">async/await</text>
  </g>
  
  <!-- Result -->
  <g transform="translate(590, 190)">
    <text x="65" y="0" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">输出结果</text>
    <rect x="10" y="30" width="110" height="80" rx="8" fill="#e94560" opacity="0.7"/>
    <text x="65" y="60" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif" font-weight="bold">完整结果</text>
    <text x="65" y="80" text-anchor="middle" fill="#ffcccc" font-size="10" font-family="sans-serif">代码 + 文档</text>
    <text x="65" y="95" text-anchor="middle" fill="#ffcccc" font-size="10" font-family="sans-serif">+ 执行日志</text>
  </g>
</svg>