<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#020210"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- High-dimensional space grid -->
  <g stroke="#1a1a4a" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
  </g>

  <!-- Vectors as points and lines -->
  <g opacity="0.6">
    <circle cx="120" cy="150" r="4" fill="#667eea"/>
    <circle cx="250" cy="120" r="3" fill="#4facfe"/>
    <circle cx="180" cy="280" r="5" fill="#f093fb"/>
    <circle cx="320" cy="200" r="3" fill="#43e97b"/>
    <circle cx="150" cy="350" r="4" fill="#fa709a"/>
    <circle cx="280" cy="320" r="3" fill="#667eea"/>
    <circle cx="400" cy="140" r="2" fill="#4facfe"/>
    <circle cx="350" cy="260" r="4" fill="#f093fb"/>
    <circle cx="220" cy="400" r="3" fill="#43e97b"/>
    <circle cx="500" cy="180" r="4" fill="#fa709a"/>
    <circle cx="450" cy="340" r="5" fill="#667eea"/>
    <circle cx="580" cy="130" r="3" fill="#4facfe"/>
    <circle cx="640" cy="220" r="4" fill="#f093fb"/>
    <circle cx="550" cy="370" r="3" fill="#43e97b"/>
    <circle cx="700" cy="160" r="4" fill="#fa709a"/>
    <circle cx="750" cy="290" r="3" fill="#667eea"/>
    <circle cx="680" cy="380" r="5" fill="#4facfe"/>
  </g>

  <!-- Query vector with glow -->
  <circle cx="420" cy="250" r="8" fill="#ff6a00" filter="url(#glow)"/>
  <circle cx="420" cy="250" r="3" fill="#fff"/>

  <!-- Search radius -->
  <circle cx="420" cy="250" r="80" fill="none" stroke="#ff6a00" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>

  <!-- Nearest neighbor arrows -->
  <g stroke="#43e97b" stroke-width="1.5" fill="none" opacity="0.35">
    <line x1="420" y1="250" x2="350" y2="260"/>
    <line x1="420" y1="250" x2="320" y2="200"/>
    <line x1="420" y1="250" x2="400" y2="140"/>
    <line x1="420" y1="250" x2="500" y2="180"/>
    <line x1="420" y1="250" x2="450" y2="340"/>
  </g>

  <!-- Speed indicator -->
  <rect x="600" y="60" width="260" height="100" rx="12" fill="#ffffff" opacity="0.05" stroke="#ff6a00" stroke-width="2"/>
  <text x="730" y="90" text-anchor="middle" fill="#ff6a00" font-size="16" font-weight="bold" font-family="sans-serif">⚡ 极速检索</text>
  <text x="730" y="115" text-anchor="middle" fill="#43e97b" font-size="20" font-weight="bold" font-family="sans-serif">10微秒/查询</text>
  <text x="730" y="140" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">比传统方案快 100倍</text>

  <!-- Memory indicator -->
  <rect x="600" y="180" width="260" height="80" rx="12" fill="#ffffff" opacity="0.05" stroke="#667eea" stroke-width="2"/>
  <text x="730" y="210" text-anchor="middle" fill="#667eea" font-size="16" font-weight="bold" font-family="sans-serif">💾 压缩存储</text>
  <text x="730" y="237" text-anchor="middle" fill="#4facfe" font-size="20" font-weight="bold" font-family="sans-serif">TurboQuant量化</text>

  <!-- Bottom title -->
  <text x="450" y="470" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif" opacity="0.7">TurboVec · Rust极速向量索引</text>
</svg>