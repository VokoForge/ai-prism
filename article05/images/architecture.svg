<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg5a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <filter id="glow5a">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="500" fill="url(#bg5a)" rx="12"/>

  <text x="450" y="40" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="bold">Apple Container 技术架构</text>

  <!-- macOS层 -->
  <g transform="translate(450, 110)">
    <rect x="-200" y="-30" width="400" height="60" rx="10" fill="#1a3a5c" stroke="#c0c0c0" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="bold">macOS Host</text>
    <text x="0" y="22" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">Apple Silicon (M1/M2/M3/M4)</text>
  </g>

  <!-- 轻量级虚拟化 -->
  <g transform="translate(450, 210)">
    <rect x="-180" y="-30" width="360" height="60" rx="10" fill="#0d2a4a" stroke="#ff6b35" stroke-width="2" filter="url(#glow5a)"/>
    <text x="0" y="5" text-anchor="middle" fill="#ff6b35" font-family="sans-serif" font-size="16" font-weight="bold">Lightweight Virtualization</text>
    <text x="0" y="22" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">Swift + Virtualization.framework</text>
  </g>

  <!-- Linux容器层 -->
  <g transform="translate(450, 310)">
    <rect x="-180" y="-30" width="360" height="60" rx="10" fill="#0d2a4a" stroke="#4a9eff" stroke-width="2" filter="url(#glow5a)"/>
    <text x="0" y="5" text-anchor="middle" fill="#4a9eff" font-family="sans-serif" font-size="16" font-weight="bold">Linux Container Runtime</text>
    <text x="0" y="22" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">OCI-compatible / Docker CLI</text>
  </g>

  <!-- 容器实例 -->
  <g transform="translate(200, 420)">
    <rect x="-70" y="-25" width="140" height="50" rx="8" fill="#1a3a5c" stroke="#00ff88" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#00ff88" font-family="sans-serif" font-size="13" font-weight="bold">Container A</text>
    <text x="0" y="20" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="10">Ubuntu 22.04</text>
  </g>

  <g transform="translate(450, 420)">
    <rect x="-70" y="-25" width="140" height="50" rx="8" fill="#1a3a5c" stroke="#00ff88" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#00ff88" font-family="sans-serif" font-size="13" font-weight="bold">Container B</text>
    <text x="0" y="20" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="10">Alpine Linux</text>
  </g>

  <g transform="translate(700, 420)">
    <rect x="-70" y="-25" width="140" height="50" rx="8" fill="#1a3a5c" stroke="#00ff88" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#00ff88" font-family="sans-serif" font-size="13" font-weight="bold">Container C</text>
    <text x="0" y="20" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="10">Debian 12</text>
  </g>

  <!-- 连接线 -->
  <g stroke="#4a8ab8" stroke-width="2" fill="none">
    <line x1="450" y1="140" x2="450" y2="180"/>
    <line x1="450" y1="240" x2="450" y2="280"/>
    <line x1="450" y1="340" x2="200" y2="395"/>
    <line x1="450" y1="340" x2="450" y2="395"/>
    <line x1="450" y1="340" x2="700" y2="395"/>
  </g>
  <g fill="#4a8ab8">
    <polygon points="450,180 445,170 455,170"/>
    <polygon points="450,280 445,270 455,270"/>
    <polygon points="200,395 208,388 208,398"/>
    <polygon points="450,395 455,385 445,385"/>
    <polygon points="700,395 692,388 692,398"/>
  </g>

  <!-- 特性标签 -->
  <g transform="translate(780, 150)">
    <rect x="-60" y="-12" width="120" height="24" rx="12" fill="#ff6b35" opacity="0.9"/>
    <text x="0" y="4" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="bold">Rosetta 2 支持</text>
  </g>
  <g transform="translate(120, 250)">
    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="#4a9eff" opacity="0.9"/>
    <text x="0" y="4" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="bold">文件共享</text>
  </g>
  <g transform="translate(780, 300)">
    <rect x="-60" y="-12" width="120" height="24" rx="12" fill="#00ff88" opacity="0.9"/>
    <text x="0" y="4" text-anchor="middle" fill="#0a1628" font-family="sans-serif" font-size="11" font-weight="bold">GPU直通</text>
  </g>
</svg>