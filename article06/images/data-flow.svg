<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg6d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <filter id="glow6d">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="500" fill="url(#bg6d)" rx="12"/>

  <text x="450" y="45" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="bold">跨平台搜索数据流：信号聚合过程</text>

  <!-- 时间轴 -->
  <g stroke="#4a8ab8" stroke-width="3" stroke-linecap="round">
    <line x1="80" y1="400" x2="820" y2="400"/>
  </g>
  <g fill="#4a8ab8" font-family="sans-serif" font-size="12">
    <text x="80" y="430">T+0ms</text>
    <text x="300" y="430">T+500ms</text>
    <text x="520" y="430">T+1200ms</text>
    <text x="740" y="430">T+2000ms</text>
  </g>

  <!-- 阶段1: 并行搜索 -->
  <g transform="translate(180, 150)">
    <rect x="-70" y="-40" width="140" height="80" rx="10" fill="#1a3a5c" stroke="#ff4500" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" fill="#ff4500" font-family="sans-serif" font-size="13" font-weight="bold">Reddit搜索</text>
    <text x="0" y="10" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">120条结果</text>
    <text x="0" y="28" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">320ms</text>
  </g>

  <g transform="translate(180, 280)">
    <rect x="-70" y="-40" width="140" height="80" rx="10" fill="#1a3a5c" stroke="#1da1f2" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" fill="#1da1f2" font-family="sans-serif" font-size="13" font-weight="bold">X搜索</text>
    <text x="0" y="10" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">85条结果</text>
    <text x="0" y="28" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">280ms</text>
  </g>

  <g transform="translate(180, 80)">
    <rect x="-50" y="-25" width="100" height="50" rx="8" fill="#1a3a5c" stroke="#ff6600" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#ff6600" font-family="sans-serif" font-size="11" font-weight="bold">HN</text>
    <text x="0" y="12" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="10">45条</text>
  </g>

  <!-- 阶段2: 去重合并 -->
  <g transform="translate(450, 200)">
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="#0d2a4a" stroke="#4a9eff" stroke-width="3" filter="url(#glow6d)"/>
    <text x="0" y="-15" text-anchor="middle" fill="#4a9eff" font-family="sans-serif" font-size="14" font-weight="bold">去重 &amp; 合并</text>
    <text x="0" y="8" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">相似度检测</text>
    <text x="0" y="26" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">250条 → 180条</text>
  </g>

  <!-- 阶段3: 排序输出 -->
  <g transform="translate(720, 200)">
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="#0d2a4a" stroke="#00ff88" stroke-width="3" filter="url(#glow6d)"/>
    <text x="0" y="-15" text-anchor="middle" fill="#00ff88" font-family="sans-serif" font-size="14" font-weight="bold">智能排序</text>
    <text x="0" y="8" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">相关性评分</text>
    <text x="0" y="26" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">Top 20 结果</text>
  </g>

  <!-- 箭头 -->
  <g stroke="#4a8ab8" stroke-width="2" fill="none">
    <path d="M250,150 L370,170"/>
    <path d="M250,280 L370,230"/>
    <path d="M230,80 L370,150"/>
  </g>
  <g fill="#4a8ab8">
    <polygon points="370,170 360,165 360,175"/>
    <polygon points="370,230 360,225 360,235"/>
    <polygon points="370,150 362,142 360,152"/>
  </g>

  <g stroke="#4a9eff" stroke-width="2" fill="none">
    <line x1="530" y1="200" x2="640" y2="200"/>
  </g>
  <g fill="#4a9eff">
    <polygon points="640,200 630,195 630,205"/>
  </g>

  <!-- 底部统计 -->
  <g transform="translate(450, 480)">
    <text x="0" y="0" text-anchor="middle" fill="#00ff88" font-family="sans-serif" font-size="14" font-weight="bold">总耗时: 2s | 覆盖 5+ 平台 | 去重率: 28% | 信号质量提升 3x</text>
  </g>
</svg>