<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg6a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <filter id="glow6a">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="500" fill="url(#bg6a)" rx="12"/>

  <text x="450" y="40" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="bold">Last30Days Skill 系统架构</text>

  <!-- 用户查询 -->
  <g transform="translate(100, 250)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1a3a5c" stroke="#fff" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">用户查询</text>
  </g>

  <!-- 箭头到Agent -->
  <g stroke="#4a8ab8" stroke-width="2" fill="none">
    <line x1="160" y1="250" x2="240" y2="250"/>
  </g>
  <g fill="#4a8ab8">
    <polygon points="240,250 230,245 230,255"/>
  </g>

  <!-- AI Agent核心 -->
  <g transform="translate(350, 250)">
    <rect x="-80" y="-50" width="160" height="100" rx="15" fill="#0d2a4a" stroke="#4a9eff" stroke-width="3" filter="url(#glow6a)"/>
    <text x="0" y="-15" text-anchor="middle" fill="#4a9eff" font-family="sans-serif" font-size="16" font-weight="bold">AI Agent</text>
    <text x="0" y="5" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">查询解析</text>
    <text x="0" y="22" text-anchor="middle" fill="#8ab8e8" font-family="sans-serif" font-size="11">任务分发</text>
  </g>

  <!-- 箭头到各平台 -->
  <g stroke="#4a8ab8" stroke-width="2" fill="none">
    <line x1="430" y1="220" x2="520" y2="140"/>
    <line x1="430" y1="250" x2="520" y2="250"/>
    <line x1="430" y1="280" x2="520" y2="360"/>
  </g>
  <g fill="#4a8ab8">
    <polygon points="520,140 510,142 512,152"/>
    <polygon points="520,250 510,245 510,255"/>
    <polygon points="520,360 512,350 510,360"/>
  </g>

  <!-- Reddit -->
  <g transform="translate(620, 130)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1a3a5c" stroke="#ff4500" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ff4500" font-family="sans-serif" font-size="14" font-weight="bold">Reddit</text>
  </g>

  <!-- X/Twitter -->
  <g transform="translate(620, 250)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1a3a5c" stroke="#1da1f2" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#1da1f2" font-family="sans-serif" font-size="14" font-weight="bold">X / Twitter</text>
  </g>

  <!-- YouTube -->
  <g transform="translate(620, 370)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1a3a5c" stroke="#ff0000" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ff0000" font-family="sans-serif" font-size="14" font-weight="bold">YouTube</text>
  </g>

  <!-- Hacker News (右侧) -->
  <g transform="translate(800, 190)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1a3a5c" stroke="#ff6600" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ff6600" font-family="sans-serif" size="14" font-weight="bold">Hacker News</text>
  </g>

  <!-- GitHub (右侧) -->
  <g transform="translate(800, 310)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1a3a5c" stroke="#fff" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">GitHub</text>
  </g>

  <!-- 聚合层 -->
  <g transform="translate(450, 430)">
    <rect x="-100" y="-25" width="200" height="50" rx="10" fill="#0d2a4a" stroke="#00ff88" stroke-width="2" filter="url(#glow6a)"/>
    <text x="0" y="5" text-anchor="middle" fill="#00ff88" font-family="sans-serif" font-size="14" font-weight="bold">结果聚合 &amp; 去重</text>
  </g>

  <!-- 箭头从平台到聚合 -->
  <g stroke="#00ff88" stroke-width="2" fill="none" stroke-dasharray="4,4">
    <path d="M620,160 L550,430"/>
    <path d="M620,250 L550,430"/>
    <path d="M620,340 L550,430"/>
    <path d="M800,220 L550,430"/>
    <path d="M800,310 L550,430"/>
  </g>

  <!-- 智能排序 -->
  <g transform="translate(700, 430)">
    <rect x="-70" y="-20" width="140" height="40" rx="8" fill="#00ff88" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" fill="#0a1628" font-family="sans-serif" font-size="12" font-weight="bold">相关性排序</text>
  </g>
</svg>