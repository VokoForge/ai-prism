<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- AI generating -->
  <rect x="60" y="50" width="300" height="60" rx="10" fill="#2a2a3e" stroke="#f5576c" stroke-width="1.5"/>
  <text x="210" y="78" text-anchor="middle" fill="#f5576c" font-size="14" font-weight="bold" font-family="sans-serif">AI输出（无品味过滤）</text>
  <text x="210" y="98" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">千篇一律的大路货</text>

  <!-- Boring content examples -->
  <g>
    <rect x="60" y="130" width="300" height="30" rx="5" fill="#f5576c" opacity="0.1" stroke="#f5576c" stroke-width="1"/>
    <text x="210" y="150" text-anchor="middle" fill="#f5576c" font-size="12" font-family="sans-serif">「这是一个很好的问题」</text>

    <rect x="60" y="170" width="300" height="30" rx="5" fill="#f5576c" opacity="0.1" stroke="#f5576c" stroke-width="1"/>
    <text x="210" y="190" text-anchor="middle" fill="#f5576c" font-size="12" font-family="sans-serif">「综上所述...」</text>

    <rect x="60" y="210" width="300" height="30" rx="5" fill="#f5576c" opacity="0.1" stroke="#f5576c" stroke-width="1"/>
    <text x="210" y="230" text-anchor="middle" fill="#f5576c" font-size="12" font-family="sans-serif">「赋能、抓手、闭环」</text>

    <rect x="60" y="250" width="300" height="30" rx="5" fill="#f5576c" opacity="0.1" stroke="#f5576c" stroke-width="1"/>
    <text x="210" y="270" text-anchor="middle" fill="#f5576c" font-size="12" font-family="sans-serif">「首先其次最后」</text>
  </g>

  <!-- X mark -->
  <text x="400" y="210" text-anchor="middle" fill="#f5576c" font-size="48" font-family="sans-serif" font-weight="bold">✕</text>
  <text x="400" y="235" text-anchor="middle" fill="#f5576c" font-size="12" font-family="sans-serif">全部淘汰</text>

  <!-- After filtering -->
  <rect x="440" y="50" width="300" height="60" rx="10" fill="#2a3a2e" stroke="#43e97b" stroke-width="1.5"/>
  <text x="590" y="78" text-anchor="middle" fill="#43e97b" font-size="14" font-weight="bold" font-family="sans-serif">品味过滤后</text>
  <text x="590" y="98" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">有风格、有灵魂的内容</text>

  <!-- Good content examples -->
  <g>
    <rect x="440" y="130" width="300" height="30" rx="5" fill="#43e97b" opacity="0.1" stroke="#43e97b" stroke-width="1"/>
    <text x="590" y="150" text-anchor="middle" fill="#43e97b" font-size="12" font-family="sans-serif">「这个问题像剥洋葱」</text>

    <rect x="440" y="170" width="300" height="30" rx="5" fill="#4facfe" opacity="0.1" stroke="#4facfe" stroke-width="1"/>
    <text x="590" y="190" text-anchor="middle" fill="#4facfe" font-size="12" font-family="sans-serif">「写代码其实是在写诗」</text>

    <rect x="440" y="210" width="300" height="30" rx="5" fill="#f093fb" opacity="0.1" stroke="#f093fb" stroke-width="1"/>
    <text x="590" y="230" text-anchor="middle" fill="#f093fb" font-size="12" font-family="sans-serif">「把复杂的事说到姥姥都懂」</text>

    <rect x="440" y="250" width="300" height="30" rx="5" fill="#fa709a" opacity="0.1" stroke="#fa709a" stroke-width="1"/>
    <text x="590" y="270" text-anchor="middle" fill="#fa709a" font-size="12" font-family="sans-serif">「少即是多，慢即是快」</text>
  </g>

  <!-- Bottom stats -->
  <rect x="150" y="330" width="500" height="40" rx="8" fill="#ffffff" opacity="0.05"/>
  <text x="400" y="355" text-anchor="middle" fill="#aaa" font-size="12" font-family="sans-serif">品味规则库：200+ 过滤模式 · 可自定义风格 · 实时评分</text>
</svg>