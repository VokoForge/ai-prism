name: Lint & Sanitize

on:
  pull_request:
    paths:
      - 'posts/**'
      - 'assets/**'
      - 'references/**'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check 5-rule compliance (Yason & Roberts)
        run: |
          chmod +x scripts/rex_review.sh
          for f in posts/yason-and-roberts/*.md; do
            echo "=== Reviewing $f ==="
            ./scripts/rex_review.sh "$f" || exit 1
          done

      - name: Run 7-checklist review (External Lens)
        run: |
          chmod +x scripts/insights_review.sh
          for f in posts/external-lens/*.md; do
            echo "=== Reviewing $f ==="
            ./scripts/insights_review.sh --quick "$f" || exit 1
          done

      - name: Validate SVG assets
        run: python3 scripts/validate_svg.py

      - name: Check for secrets
        run: |
          matches=$(grep -rE 'sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{36}|github_pat_' posts/ assets/ 2>/dev/null | grep -v 'review.sh' | grep -v 'insights_review.sh' || true)
          if [[ -n "$matches" ]]; then
            echo "FAIL: secrets detected"
            echo "$matches"
            exit 1
          else
            echo "OK: no secrets"
          fi

      - name: Check no external image refs
        run: |
          ! grep -rE '!\[.*\]\(https?://' posts/ || \
            (echo "Found external image ref, fail" && exit 1)

      - name: Check no internal org refs
        run: |
          ! grep -rE 'mindapex-crop' posts/ || \
            (echo "Found internal org ref, fail" && exit 1)
