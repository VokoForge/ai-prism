<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- Magic transformation effect -->
  <g transform="translate(450, 240)" filter="url(#glow)">
    <!-- Left side: messy documents -->
    <g transform="translate(-180, 0)">
      <rect x="-60" y="-50" width="50" height="65" rx="3" fill="#16213e" stroke="#e94560" stroke-width="2" transform="rotate(-15)"/>
      <text x="-35" y="-15" text-anchor="middle" fill="#e94560" font-size="10" font-family="sans-serif" transform="rotate(-15)">PDF</text>
      
      <rect x="-10" y="-60" width="50" height="65" rx="3" fill="#16213e" stroke="#ffd700" stroke-width="2" transform="rotate(5)"/>
      <text x="15" y="-25" text-anchor="middle" fill="#ffd700" font-size="10" font-family="sans-serif" transform="rotate(5)">DOC</text>
      
      <rect x="-40" y="10" width="50" height="65" rx="3" fill="#16213e" stroke="#00d9ff" stroke-width="2" transform="rotate(-5)"/>
      <text x="-15" y="45" text-anchor="middle" fill="#00d9ff" font-size="10" font-family="sans-serif" transform="rotate(-5)">PPT</text>
    </g>
    
    <!-- Magic wand / transformation arrow -->
    <g>
      <line x1="-80" y1="0" x2="80" y2="0" stroke="#a855f7" stroke-width="4" stroke-dasharray="10,5"/>
      <polygon points="80,-10 100,0 80,10" fill="#a855f7"/>
      
      <!-- Sparkles -->
      <circle cx="-40" cy="-20" r="3" fill="#a855f7" opacity="0.8"/>
      <circle cx="0" cy="-30" r="4" fill="#ffd700" opacity="0.9"/>
      <circle cx="40" cy="-15" r="3" fill="#00d9ff" opacity="0.8"/>
      <circle cx="-20" cy="25" r="3" fill="#e94560" opacity="0.7"/>
      <circle cx="30" cy="20" r="4" fill="#00ff88" opacity="0.8"/>
    </g>
    
    <!-- Right side: clean Markdown -->
    <g transform="translate(180, 0)">
      <rect x="-60" y="-70" width="120" height="140" rx="8" fill="#16213e" stroke="#00ff88" stroke-width="3"/>
      <text x="0" y="-45" text-anchor="middle" fill="#00ff88" font-size="12" font-family="sans-serif" font-weight="bold">Markdown</text>
      
      <!-- Markdown content lines -->
      <line x1="-45" y1="-25" x2="45" y2="-25" stroke="#444" stroke-width="2"/>
      <line x1="-45" y1="-10" x2="30" y2="-10" stroke="#555" stroke-width="2"/>
      <line x1="-45" y1="5" x2="40" y2="5" stroke="#444" stroke-width="2"/>
      <line x1="-45" y1="20" x2="20" y2="20" stroke="#555" stroke-width="2"/>
      <line x1="-45" y1="35" x2="35" y2="35" stroke="#444" stroke-width="2"/>
      <line x1="-45" y1="50" x2="25" y2="50" stroke="#555" stroke-width="2"/>
      
      <!-- Table representation -->
      <rect x="-45" y="60" width="90" height="25" rx="3" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
      <line x1="-15" y1="60" x2="-15" y2="85" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
      <line x1="15" y1="60" x2="15" y2="85" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="450" y="430" text-anchor="middle" fill="#fff" font-size="28" font-family="sans-serif" font-weight="bold" filter="url(#glow)">markitdown</text>
  <text x="450" y="460" text-anchor="middle" fill="#a855f7" font-size="16" font-family="sans-serif">微软官方出品 | 152K Star</text>
</svg>