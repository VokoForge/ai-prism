<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="700" height="350" fill="url(#bg)"/>
  
  <text x="350" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff6644" text-anchor="middle">提示词泄露揭示的AI控制架构</text>
  
  <!-- Central pyramid -->
  <rect x="175" y="260" width="350" height="40" rx="4" fill="#1a2332" stroke="#30363d"/>
  <text x="350" y="285" font-family="Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Token 生成层 — 逐字输出</text>
  
  <rect x="200" y="210" width="300" height="40" rx="4" fill="#2d1a2e" stroke="#d97706" stroke-width="1"/>
  <text x="350" y="235" font-family="Arial, sans-serif" font-size="12" fill="#d97706" text-anchor="middle">安全过滤层 — 拒绝/审查/警告</text>
  <line x1="350" y1="250" x2="350" y2="260" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>
  
  <rect x="225" y="160" width="250" height="40" rx="4" fill="#1a2332" stroke="#79c0ff" stroke-width="1"/>
  <text x="350" y="185" font-family="Arial, sans-serif" font-size="12" fill="#79c0ff" text-anchor="middle">行为约束层 — 对话风格/人格/语气</text>
  <line x1="350" y1="200" x2="350" y2="210" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>
  
  <rect x="250" y="110" width="200" height="40" rx="4" fill="#1a2332" stroke="#f0883e" stroke-width="1"/>
  <text x="350" y="135" font-family="Arial, sans-serif" font-size="12" fill="#f0883e" text-anchor="middle">身份定义层 — 我是谁?规则是什么?</text>
  <line x1="350" y1="150" x2="350" y2="160" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- System Prompt at top -->
  <rect x="200" y="50" width="300" height="50" rx="6" fill="#0d2b1e" stroke="#ff6644" stroke-width="2"/>
  <text x="350" y="72" font-family="monospace" font-size="14" font-weight="bold" fill="#ff6644" text-anchor="middle">系统提示词</text>
  <text x="350" y="90" font-family="Arial, sans-serif" font-size="10" fill="#ff6644" text-anchor="middle">(控制一切的顶层指令)</text>
  <line x1="350" y1="100" x2="350" y2="110" stroke="#ff6644" stroke-width="2"/>
  
  <!-- Side annotations -->
  <text x="540" y="185" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">这些层共同构成了</text>
  <text x="540" y="200" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">用户感知到的"AI人格"</text>
  
  <line x1="520" y1="185" x2="475" y2="185" stroke="#8b949e" stroke-width="0.5" marker-end="url(#arrow)"/>
  
  <!-- Bottom insight -->
  <text x="350" y="325" font-family="Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">层层控制之下，生成层只是"傀儡"——系统提示词才是真正的大脑</text>
</svg>