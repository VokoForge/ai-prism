<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Central Shield -->
  <g transform="translate(400,200)">
    <!-- Shield shape -->
    <path d="M0,-90 L60,-60 L60,20 Q60,60 0,80 Q-60,60 -60,20 L-60,-60 Z" 
          fill="#0f0f23" stroke="url(#shield)" stroke-width="2" filter="url(#glow)"/>
    <!-- Shield inner -->
    <path d="M0,-75 L48,-48 L48,18 Q48,52 0,68 Q-48,52 -48,18 L-48,-48 Z" 
          fill="url(#shield)" opacity="0.08"/>
    
    <!-- Checkmark in shield -->
    <path d="M-18,0 L-8,12 L18,-16" fill="none" stroke="#00ff88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  </g>
  
  <!-- Scanning beam from top -->
  <rect x="0" y="0" width="800" height="4" fill="url(#scan)" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Skill module boxes being scanned -->
  <!-- Left skill module - safe (green) -->
  <rect x="100" y="110" width="100" height="60" rx="6" fill="#0f0f23" stroke="#00ff88" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="150" y="135" fill="#00ff88" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">安全技能</text>
  <text x="150" y="152" fill="#00ff88" font-size="8" text-anchor="middle" font-family="sans-serif">通过检测</text>
  <path d="M130,115 L135,122 L145,112" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  
  <!-- Right skill module - danger (red) -->
  <rect x="580" y="110" width="100" height="60" rx="6" fill="#0f0f23" stroke="#ff2d95" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="630" y="135" fill="#ff2d95" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">恶意模块</text>
  <text x="630" y="152" fill="#ff2d95" font-size="8" text-anchor="middle" font-family="sans-serif">发现威胁</text>
  <path d="M615,118 L625,128 M625,118 L615,128" stroke="#ff2d95" stroke-width="1.5"/>
  
  <!-- Bottom left - warning -->
  <rect x="160" y="270" width="100" height="60" rx="6" fill="#0f0f23" stroke="#ffcc00" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="210" y="295" fill="#ffcc00" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">可疑权限</text>
  <text x="210" y="312" fill="#ffcc00" font-size="8" text-anchor="middle" font-family="sans-serif">需审查</text>
  <path d="M195,278 L195,288 M195,293 L195,300" stroke="#ffcc00" stroke-width="1.5"/>
  
  <!-- Bottom right - safe -->
  <rect x="540" y="270" width="100" height="60" rx="6" fill="#0f0f23" stroke="#00ff88" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="590" y="295" fill="#00ff88" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">合规技能</text>
  <text x="590" y="312" fill="#00ff88" font-size="8" text-anchor="middle" font-family="sans-serif">通过</text>
  <path d="M570,283 L575,290 L585,280" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  
  <!-- Radar circles around shield -->
  <circle cx="400" cy="200" r="130" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
  <circle cx="400" cy="200" r="170" fill="none" stroke="#00f0ff" stroke-width="0.3" opacity="0.06"/>
  
  <!-- NVIDIA logo area -->
  <text x="400" y="50" fill="#ffffff" font-size="22" font-weight="bold" text-anchor="middle" font-family="sans-serif">6000星！英伟达官方AI安全扫描器</text>
  <text x="400" y="75" fill="#00f0ff" font-size="14" text-anchor="middle" font-family="sans-serif" opacity="0.8">检测技能漏洞 · 拦截恶意代码 · 呼应Anthropic第三层安全</text>
</svg>