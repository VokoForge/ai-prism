<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="url(#bg2)"/>
  <text x="500" y="50" text-anchor="middle" font-size="32" font-weight="700" fill="#f0f9ff">Four-Brain Architecture</text>
  <text x="500" y="80" text-anchor="middle" font-size="16" fill="#7dd3fc">调度器按 任务难度 / 成本 / SLA 选择大脑</text>

  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc">Task In</text>
    <text x="90" y="48" text-anchor="middle" font-size="11" fill="#94a3b8">难度 / 成本 / SLA</text>
  </g>

  <line x1="240" y1="160" x2="340" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <g transform="translate(340, 100)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="3"/>
    <text x="100" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">Scheduler</text>
    <text x="100" y="65" text-anchor="middle" font-size="11" fill="#cbd5e1">select_brain(task)</text>
    <text x="100" y="85" text-anchor="middle" font-size="11" fill="#cbd5e1">execute_with_fallback</text>
    <text x="100" y="105" text-anchor="middle" font-size="11" fill="#94a3b8">无状态纯函数</text>
  </g>

  <line x1="540" y1="160" x2="640" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="160" x2="640" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="160" x2="640" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="160" x2="640" y2="400" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <g transform="translate(640, 40)">
    <rect x="0" y="0" width="160" height="80" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#f8fafc">Brain 1</text>
    <text x="80" y="50" text-anchor="middle" font-size="11" fill="#bfdbfe">Primary</text>
    <text x="80" y="66" text-anchor="middle" font-size="11" fill="#bfdbfe">长上下文 · 推理</text>
  </g>

  <g transform="translate(640, 200)">
    <rect x="0" y="0" width="160" height="80" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#f8fafc">Brain 2</text>
    <text x="80" y="50" text-anchor="middle" font-size="11" fill="#a7f3d0">Fast</text>
    <text x="80" y="66" text-anchor="middle" font-size="11" fill="#a7f3d0">短任务 · 补全</text>
  </g>

  <g transform="translate(640, 360)">
    <rect x="0" y="0" width="160" height="80" rx="10" fill="#78350f" stroke="#f59e0b" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#f8fafc">Brain 3</text>
    <text x="80" y="50" text-anchor="middle" font-size="11" fill="#fde68a">Deep</text>
    <text x="80" y="66" text-anchor="middle" font-size="11" fill="#fde68a">多步 · 复杂</text>
  </g>

  <g transform="translate(820, 200)">
    <rect x="0" y="0" width="160" height="80" rx="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#f8fafc">Brain 4</text>
    <text x="80" y="50" text-anchor="middle" font-size="11" fill="#fecaca">High</text>
    <text x="80" y="66" text-anchor="middle" font-size="11" fill="#fecaca">关键 · 兜底</text>
  </g>

  <path d="M 800 240 Q 810 240 820 240" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <g transform="translate(60, 510)">
    <text x="0" y="0" font-size="13" fill="#cbd5e1">1→2→3→4 失败自动降级 · 质量分统一信号</text>
  </g>
</svg>
