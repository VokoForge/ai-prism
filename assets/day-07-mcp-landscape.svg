<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a1f3a"/>
    </linearGradient>
  </defs>
  <rect width="900" height="540" fill="url(#bg)"/>
  <text x="450" y="38" font-size="22" fill="#fff" text-anchor="middle" font-weight="600">MCP 生态 5 个生产案例 — 触发模式 × 存储</text>
  <text x="450" y="60" font-size="12" fill="#94a3b8" text-anchor="middle">横轴: 数据存储复杂度 · 纵轴: 触发模式 · 气泡大小: 日均调用</text>

  <!-- Axes -->
  <line x1="90" y1="480" x2="850" y2="480" stroke="#475569" stroke-width="1.5"/>
  <line x1="90" y1="100" x2="90" y2="480" stroke="#475569" stroke-width="1.5"/>

  <text x="470" y="510" font-size="11" fill="#94a3b8" text-anchor="middle">数据存储复杂度 (本地→分布式)</text>
  <text x="40" y="290" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(-90 40 290)">触发模式 (被动→主动)</text>

  <text x="90" y="498" font-size="10" fill="#64748b" text-anchor="middle">本地</text>
  <text x="470" y="498" font-size="10" fill="#64748b" text-anchor="middle">混合</text>
  <text x="850" y="498" font-size="10" fill="#64748b" text-anchor="middle">分布式</text>
  <text x="80" y="484" font-size="10" fill="#64748b" text-anchor="end">被动</text>
  <text x="80" y="290" font-size="10" fill="#64748b" text-anchor="end">混合</text>
  <text x="80" y="100" font-size="10" fill="#64748b" text-anchor="end">主动</text>

  <!-- Quadrant divider -->
  <line x1="470" y1="100" x2="470" y2="480" stroke="#334155" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="90" y1="290" x2="850" y2="290" stroke="#334155" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- 1 claude-mem: x=120(local), y=420(passive), r=24, color=blue -->
  <g>
    <circle cx="120" cy="420" r="24" fill="#3b82f6" opacity="0.7" stroke="#93c5fd" stroke-width="2"/>
    <text x="120" y="424" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">1</text>
    <text x="120" y="465" font-size="10" fill="#fff" text-anchor="middle">claude-mem</text>
    <text x="120" y="479" font-size="9" fill="#cbd5e1" text-anchor="middle">50k/d</text>
  </g>

  <!-- 2 multica: x=470(无存储), y=290(路由), r=20, color=purple -->
  <g>
    <circle cx="470" cy="290" r="20" fill="#a855f7" opacity="0.7" stroke="#d8b4fe" stroke-width="2"/>
    <text x="470" y="294" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">2</text>
    <text x="510" y="294" font-size="10" fill="#fff" text-anchor="middle">multica</text>
    <text x="510" y="308" font-size="9" fill="#cbd5e1" text-anchor="middle">30k/d</text>
  </g>

  <!-- 3 Scrapling: x=600(mix), y=180(mix), r=34, color=orange (biggest) -->
  <g>
    <circle cx="600" cy="200" r="34" fill="#f97316" opacity="0.7" stroke="#fdba74" stroke-width="2"/>
    <text x="600" y="204" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">3</text>
    <text x="600" y="245" font-size="10" fill="#fff" text-anchor="middle">Scrapling</text>
    <text x="600" y="259" font-size="9" fill="#cbd5e1" text-anchor="middle">200k/d</text>
  </g>

  <!-- 4 academic: x=400(轻量存储), y=420(passive), r=22, color=teal -->
  <g>
    <circle cx="400" cy="420" r="22" fill="#14b8a6" opacity="0.7" stroke="#5eead4" stroke-width="2"/>
    <text x="400" y="424" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">4</text>
    <text x="400" y="463" font-size="10" fill="#fff" text-anchor="middle">academic</text>
    <text x="400" y="477" font-size="9" fill="#cbd5e1" text-anchor="middle">80k/d</text>
  </g>

  <!-- 5 TrendRadar: x=800(distributed), y=110(主动), r=30, color=pink -->
  <g>
    <circle cx="780" cy="130" r="30" fill="#ec4899" opacity="0.7" stroke="#f9a8d4" stroke-width="2"/>
    <text x="780" y="134" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">5</text>
    <text x="780" y="172" font-size="10" fill="#fff" text-anchor="middle">TrendRadar</text>
    <text x="780" y="186" font-size="9" fill="#cbd5e1" text-anchor="middle">150k/d</text>
  </g>

  <!-- Annotations -->
  <text x="180" y="135" font-size="10" fill="#64748b">← 个人工具区</text>
  <text x="820" y="460" font-size="10" fill="#64748b" text-anchor="end">企业基础设施 →</text>
</svg>
