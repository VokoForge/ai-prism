<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">
  <rect width="800" height="500" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Cost Structure (M14)</text>

  <g transform="translate(150, 90)">
    <circle cx="180" cy="180" r="140" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="180" y="170" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">¥6,300</text>
    <text x="180" y="195" text-anchor="middle" font-size="13" fill="#1e3a8a">月总成本</text>
  </g>

  <g transform="translate(70, 80)">
    <path d="M 280 90 A 140 140 0 0 1 196 296 L 196 180 Z" fill="#3b82f6" opacity="0.9"/>
    <text x="240" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">66%</text>
  </g>
  <g transform="translate(70, 80)">
    <path d="M 196 296 A 140 140 0 0 1 78 232 L 180 180 Z" fill="#10b981" opacity="0.9"/>
    <text x="155" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">24%</text>
  </g>
  <g transform="translate(70, 80)">
    <path d="M 78 232 A 140 140 0 0 1 65 192 L 180 180 Z" fill="#f59e0b" opacity="0.9"/>
    <text x="105" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">7%</text>
  </g>
  <g transform="translate(70, 80)">
    <path d="M 65 192 A 140 140 0 0 1 280 90 L 180 180 Z" fill="#ef4444" opacity="0.9"/>
    <text x="100" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3%</text>
  </g>

  <g transform="translate(440, 90)">
    <text x="0" y="0" font-size="16" font-weight="700" fill="#0f172a">明细</text>
    <g font-size="13" fill="#1e293b">
      <g transform="translate(0, 30)">
        <rect x="0" y="-12" width="14" height="14" fill="#3b82f6"/>
        <text x="22" y="0">模型 API · ¥4,180</text>
      </g>
      <g transform="translate(0, 60)">
        <rect x="0" y="-12" width="14" height="14" fill="#10b981"/>
        <text x="22" y="0">服务器 · ¥1,520</text>
      </g>
      <g transform="translate(0, 90)">
        <rect x="0" y="-12" width="14" height="14" fill="#f59e0b"/>
        <text x="22" y="0">存储 / 监控 · ¥420</text>
      </g>
      <g transform="translate(0, 120)">
        <rect x="0" y="-12" width="14" height="14" fill="#ef4444"/>
        <text x="22" y="0">其他 · ¥180</text>
      </g>
    </g>
    <g transform="translate(0, 170)">
      <text x="0" y="0" font-size="13" font-weight="600" fill="#0f172a">其中 62% 走免费/低价模型</text>
      <text x="0" y="22" font-size="12" fill="#475569">→ 四脑调度的核心收益</text>
    </g>
  </g>

  <g transform="translate(60, 410)">
    <text x="0" y="0" font-size="14" font-weight="600" fill="#0f172a">关键：让钱花得</text>
    <text x="170" y="0" font-size="14" font-weight="700" fill="#10b981">可见</text>
    <text x="220" y="0" font-size="14" font-weight="600" fill="#0f172a">·</text>
    <text x="240" y="0" font-size="14" font-weight="700" fill="#3b82f6">可解释</text>
    <text x="305" y="0" font-size="14" font-weight="600" fill="#0f172a">·</text>
    <text x="325" y="0" font-size="14" font-weight="700" fill="#f59e0b">可降级</text>
  </g>
</svg>
