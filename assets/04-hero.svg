<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="500" fill="url(#bg4)"/>
  <text x="500" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#ecfdf5">Knowledge Graph as Long-Term Memory</text>
  <text x="500" y="78" text-anchor="middle" font-size="14" fill="#a7f3d0">实体 · 关系 · 事件 + RBAC + 审计 + 审批</text>

  <g font-size="11" fill="#fff">
    <g transform="translate(150, 180)">
      <circle r="60" fill="#10b981" stroke="#34d399" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-weight="700">Person</text>
      <text x="0" y="10" text-anchor="middle" font-size="10">CEO / 研发 / 用户</text>
    </g>

    <g transform="translate(500, 130)">
      <circle r="65" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-weight="700">Project</text>
      <text x="0" y="10" text-anchor="middle" font-size="10">27+ repos</text>
    </g>

    <g transform="translate(500, 360)">
      <circle r="65" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-weight="700">Decision</text>
      <text x="0" y="10" text-anchor="middle" font-size="10">P0 实体 · 需审批</text>
    </g>

    <g transform="translate(820, 230)">
      <circle r="65" fill="#ef4444" stroke="#f87171" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-weight="700">Incident</text>
      <text x="0" y="10" text-anchor="middle" font-size="10">事故 + 根因</text>
    </g>

    <g transform="translate(280, 400)">
      <circle r="55" fill="#a855f7" stroke="#c084fc" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-weight="700">Run</text>
      <text x="0" y="10" text-anchor="middle" font-size="10">Agent 执行</text>
    </g>

    <g transform="translate(720, 400)">
      <circle r="55" fill="#ec4899" stroke="#f472b6" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-weight="700">Artifact</text>
      <text x="0" y="10" text-anchor="middle" font-size="10">PR / 文档 / 图</text>
    </g>
  </g>

  <g stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4" fill="none">
    <line x1="210" y1="180" x2="435" y2="130"/>
    <line x1="500" y1="195" x2="500" y2="295"/>
    <line x1="565" y1="130" x2="755" y2="230"/>
    <line x1="335" y1="400" x2="500" y2="360"/>
    <line x1="500" y1="360" x2="665" y2="400"/>
    <line x1="755" y1="280" x2="720" y2="345"/>
  </g>

  <g font-size="10" fill="#cbd5e1" text-anchor="middle">
    <text x="320" y="155">OWNS</text>
    <text x="500" y="250">CAUSED</text>
    <text x="660" y="180">AFFECTED</text>
    <text x="420" y="385">GENERATED</text>
    <text x="585" y="385">PRODUCED</text>
    <text x="740" y="320">DOCUMENTED_IN</text>
  </g>
</svg>
