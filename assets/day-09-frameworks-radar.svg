<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a1f3a"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#bg)"/>
  <text x="450" y="40" font-size="22" fill="#fff" text-anchor="middle" font-weight="600">8 个 Agent 框架 5 维雷达对比</text>
  <text x="450" y="62" font-size="12" fill="#94a3b8" text-anchor="middle">学习 / 生产 / 调试 / 性能 / 团队适配</text>

  <!-- 5 axes (radar center at 450, 350) -->
  <g transform="translate(450, 350)">
    <!-- Outer pentagon -->
    <polygon points="0,-220 209,-68 129,178 -129,178 -209,-68" fill="none" stroke="#334155" stroke-width="1.5"/>

    <!-- Inner pentagons (scale rings) -->
    <polygon points="0,-176 167,-54 103,142 -103,142 -167,-54" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.6"/>
    <polygon points="0,-132 125,-41 78,107 -78,107 -125,-41" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.4"/>
    <polygon points="0,-88 84,-27 52,71 -52,71 -84,-27" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.3"/>
    <polygon points="0,-44 42,-14 26,36 -26,36 -42,-14" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.2"/>

    <!-- Axis labels -->
    <text x="0" y="-235" font-size="12" fill="#cbd5e1" text-anchor="middle" font-weight="600">学习曲线</text>
    <text x="225" y="-72" font-size="12" fill="#cbd5e1" text-anchor="start" font-weight="600">生产稳定</text>
    <text x="142" y="195" font-size="12" fill="#cbd5e1" text-anchor="start" font-weight="600">调试</text>
    <text x="-142" y="195" font-size="12" fill="#cbd5e1" text-anchor="end" font-weight="600">性能</text>
    <text x="-225" y="-72" font-size="12" fill="#cbd5e1" text-anchor="end" font-weight="600">团队适配</text>

    <!-- 5 axis lines -->
    <line x1="0" y1="0" x2="0" y2="-220" stroke="#475569" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="209" y2="-68" stroke="#475569" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="129" y2="178" stroke="#475569" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="-129" y2="178" stroke="#475569" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="-209" y2="-68" stroke="#475569" stroke-width="0.8"/>

    <!-- LangGraph: 4,4,4,4,3 → points: (0,-176),(167,-54),(103,142),(-103,142),(-125,-41) -->
    <polygon points="0,-176 167,-54 103,142 -103,142 -125,-41" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="-100" font-size="11" fill="#60a5fa" font-weight="600">LangGraph</text>

    <!-- OpenHands: 3,4,5,4,4 -->
    <polygon points="0,-132 167,-54 129,178 -103,142 -167,-54" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="180" y="100" font-size="11" fill="#4ade80" font-weight="600">OpenHands</text>

    <!-- CrewAI: 5,3,4,3,3 -->
    <polygon points="0,-220 125,-41 103,142 -78,107 -125,-41" fill="#eab308" opacity="0.2" stroke="#eab308" stroke-width="2"/>
    <text x="0" y="-245" font-size="11" fill="#fde047" font-weight="600">CrewAI</text>

    <!-- AutoGen: 3,3,3,3,3 -->
    <polygon points="0,-132 125,-41 78,107 -78,107 -125,-41" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="-200" y="100" font-size="11" fill="#c084fc" font-weight="600">AutoGen</text>

    <!-- MetaGPT / AgentVerse / Camel: 2,2,2,2,2 -->
    <polygon points="0,-88 84,-27 52,71 -52,71 -84,-27" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="50" y="40" font-size="10" fill="#fca5a5" font-weight="500">学术三剑客</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20, 510)">
    <rect x="0" y="0" width="14" height="14" fill="#3b82f6" opacity="0.6"/>
    <text x="20" y="11" font-size="11" fill="#cbd5e1">LangGraph (主力)</text>
    <rect x="140" y="0" width="14" height="14" fill="#22c55e" opacity="0.6"/>
    <text x="160" y="11" font-size="11" fill="#cbd5e1">OpenHands (编码)</text>
    <rect x="290" y="0" width="14" height="14" fill="#eab308" opacity="0.6"/>
    <text x="310" y="11" font-size="11" fill="#cbd5e1">CrewAI (轻量)</text>
    <rect x="420" y="0" width="14" height="14" fill="#a855f7" opacity="0.6"/>
    <text x="440" y="11" font-size="11" fill="#cbd5e1">AutoGen (备份)</text>
    <rect x="560" y="0" width="14" height="14" fill="#ef4444" opacity="0.4"/>
    <text x="580" y="11" font-size="11" fill="#cbd5e1">MetaGPT/Verse/Camel</text>
  </g>
  <g transform="translate(20, 545)">
    <text x="0" y="11" font-size="10" fill="#94a3b8">评分公式: 生产稳定 × 3 + 调试 × 2 + 性能 × 2 + 学习曲线 × 1 + 团队适配 × 0.5</text>
    <text x="0" y="28" font-size="10" fill="#94a3b8">数据来源: 6 个真实项目, 1-20 人团队, 6 个月使用</text>
  </g>
</svg>
