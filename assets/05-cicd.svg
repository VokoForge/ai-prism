<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="500" fill="url(#bg5)"/>
  <text x="500" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#fef2f2">CI/CD Pipeline</text>
  <text x="500" y="80" text-anchor="middle" font-size="14" fill="#fecaca">PR 创建 → staging 平均 12 分钟 · 人类 review 抽样 20%</text>

  <g font-size="13" fill="#fff" text-anchor="middle">
    <g transform="translate(60, 130)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#7c2d12" stroke="#fca5a5" stroke-width="1"/>
      <text x="70" y="30" font-weight="700">Agent 写 PR</text>
      <text x="70" y="50" font-size="10" fill="#fecaca">Rex / Kai</text>
    </g>
    <g transform="translate(240, 130)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#7c2d12" stroke="#fca5a5" stroke-width="1"/>
      <text x="70" y="30" font-weight="700">lint + typecheck</text>
      <text x="70" y="50" font-size="10" fill="#fecaca">30s</text>
    </g>
    <g transform="translate(420, 130)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#7c2d12" stroke="#fca5a5" stroke-width="1"/>
      <text x="70" y="30" font-weight="700">test</text>
      <text x="70" y="50" font-size="10" fill="#fecaca">3 min</text>
    </g>
    <g transform="translate(600, 130)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#7c2d12" stroke="#fca5a5" stroke-width="1"/>
      <text x="70" y="30" font-weight="700">auto review</text>
      <text x="70" y="50" font-size="10" fill="#fecaca">Brain 2 / 1 min</text>
    </g>
    <g transform="translate(780, 130)">
      <rect x="0" y="0" width="160" height="60" rx="8" fill="#16a34a" stroke="#86efac" stroke-width="1"/>
      <text x="80" y="30" font-weight="700">merge + staging</text>
      <text x="80" y="50" font-size="10" fill="#bbf7d0">5 min</text>
    </g>
  </g>

  <g font-size="13" fill="#fff" text-anchor="middle">
    <g transform="translate(60, 240)">
      <rect x="0" y="0" width="240" height="60" rx="8" fill="#7c2d12" stroke="#fca5a5" stroke-width="1"/>
      <text x="120" y="30" font-weight="700">smoke test</text>
      <text x="120" y="50" font-size="10" fill="#fecaca">2 min · 必跑</text>
    </g>
    <g transform="translate(340, 240)">
      <rect x="0" y="0" width="240" height="60" rx="8" fill="#7c2d12" stroke="#fca5a5" stroke-width="1"/>
      <text x="120" y="30" font-weight="700">人工 review 抽样</text>
      <text x="120" y="50" font-size="10" fill="#fecaca">20% 抽样</text>
    </g>
    <g transform="translate(620, 240)">
      <rect x="0" y="0" width="320" height="60" rx="8" fill="#1e3a8a" stroke="#93c5fd" stroke-width="1"/>
      <text x="160" y="30" font-weight="700">人工 promote to prod</text>
      <text x="160" y="50" font-size="10" fill="#bfdbfe">高风险卡点</text>
    </g>
  </g>

  <g transform="translate(0, 360)">
    <rect x="60" y="0" width="880" height="80" rx="12" fill="#7c2d12" stroke="#fca5a5" stroke-width="2"/>
    <text x="500" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">4 个卫生指标 · 每天 9:00 自动跑</text>
    <text x="500" y="55" text-anchor="middle" font-size="12" fill="#fecaca">① 昨日 cost/预算 ≤ 80%   ② PR 失败率 ≤ 10%   ③ KG 错误率 ≤ 8%   ④ 4 脑可用性 ≥ 99%</text>
  </g>
</svg>
