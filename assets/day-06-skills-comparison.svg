<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="ax" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="900" height="540" fill="url(#bg)"/>
  <text x="450" y="38" font-size="22" fill="#fff" text-anchor="middle" font-weight="600">6 Skills 生态项目 — 影响力 × 创新度 横评</text>
  <text x="450" y="60" font-size="12" fill="#94a3b8" text-anchor="middle">气泡大小 = 总 ⭐ 数 · 颜色 = 月新增 ⭐（红&gt;5k · 黄 1-5k · 绿 &lt;1k）</text>

  <!-- Axes -->
  <line x1="90" y1="480" x2="850" y2="480" stroke="#475569" stroke-width="1.5"/>
  <line x1="90" y1="100" x2="90" y2="480" stroke="#475569" stroke-width="1.5"/>
  <text x="470" y="510" font-size="11" fill="#94a3b8" text-anchor="middle">创新度 (1-5)</text>
  <text x="40" y="290" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(-90 40 290)">月新增 ⭐ (k)</text>

  <!-- Axis ticks -->
  <text x="90" y="498" font-size="10" fill="#64748b" text-anchor="middle">1</text>
  <text x="280" y="498" font-size="10" fill="#64748b" text-anchor="middle">2</text>
  <text x="470" y="498" font-size="10" fill="#64748b" text-anchor="middle">3</text>
  <text x="660" y="498" font-size="10" fill="#64748b" text-anchor="middle">4</text>
  <text x="850" y="498" font-size="10" fill="#64748b" text-anchor="middle">5</text>
  <text x="80" y="484" font-size="10" fill="#64748b" text-anchor="end">0</text>
  <text x="80" y="420" font-size="10" fill="#64748b" text-anchor="end">5</text>
  <text x="80" y="360" font-size="10" fill="#64748b" text-anchor="end">10</text>
  <text x="80" y="300" font-size="10" fill="#64748b" text-anchor="end">15</text>
  <text x="80" y="240" font-size="10" fill="#64748b" text-anchor="end">20</text>
  <text x="80" y="180" font-size="10" fill="#64748b" text-anchor="end">25</text>
  <text x="80" y="120" font-size="10" fill="#64748b" text-anchor="end">30</text>

  <!-- Quadrant labels -->
  <text x="470" y="135" font-size="11" fill="#475569" text-anchor="middle" opacity="0.6">低创新 · 高增长（已是大佬在卷）</text>
  <text x="660" y="135" font-size="11" fill="#475569" text-anchor="middle" opacity="0.6">高创新 · 高增长（明星）</text>
  <text x="470" y="455" font-size="11" fill="#475569" text-anchor="middle" opacity="0.6">低创新 · 低增长（小众）</text>
  <text x="660" y="455" font-size="11" fill="#475569" text-anchor="middle" opacity="0.6">高创新 · 低增长（潜力股）</text>

  <!-- Bubbles: x = innov (90-850) ; y = 480 - (star_month_k * 12) ; r = total_star / 4 + 18 -->
  <!-- 1 addyosmani/agent-skills : innov=3.5, monthly=22.2k, total=47.4k -->
  <g>
    <circle cx="640" cy="213" r="30" fill="#ef4444" opacity="0.65" stroke="#fca5a5" stroke-width="2"/>
    <text x="640" y="217" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">1</text>
    <text x="640" y="258" font-size="11" fill="#fff" text-anchor="middle">agent-skills</text>
    <text x="640" y="272" font-size="9" fill="#cbd5e1" text-anchor="middle">22.2k / 47.4k</text>
  </g>

  <!-- 2 Koalalive/writing-agent : innov=4.5, monthly=5.3k, total=5.3k -->
  <g>
    <circle cx="780" cy="416" r="20" fill="#eab308" opacity="0.65" stroke="#fde68a" stroke-width="2"/>
    <text x="780" y="420" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">2</text>
    <text x="780" y="450" font-size="11" fill="#fff" text-anchor="middle">writing-agent</text>
    <text x="780" y="464" font-size="9" fill="#cbd5e1" text-anchor="middle">5.3k / 5.3k</text>
  </g>

  <!-- 3 xtyseven8/wewrite : innov=4, monthly=1.5k, total=3.1k -->
  <g>
    <circle cx="710" cy="462" r="18" fill="#22c55e" opacity="0.65" stroke="#86efac" stroke-width="2"/>
    <text x="710" y="466" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">3</text>
    <text x="710" y="492" font-size="10" fill="#fff" text-anchor="middle">wewrite</text>
  </g>

  <!-- 4 datawhalechina/vibe-blog : innov=3, monthly=13.2k, total=54.9k -->
  <g>
    <circle cx="565" cy="322" r="32" fill="#ef4444" opacity="0.65" stroke="#fca5a5" stroke-width="2"/>
    <text x="565" y="326" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">4</text>
    <text x="565" y="368" font-size="11" fill="#fff" text-anchor="middle">vibe-blog</text>
    <text x="565" y="382" font-size="9" fill="#cbd5e1" text-anchor="middle">13.2k / 54.9k</text>
  </g>

  <!-- 5 shanraisshan/best-practice : innov=2.5, monthly=5.2k, total=46.5k -->
  <g>
    <circle cx="495" cy="418" r="30" fill="#eab308" opacity="0.65" stroke="#fde68a" stroke-width="2"/>
    <text x="495" y="422" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">5</text>
    <text x="495" y="462" font-size="11" fill="#fff" text-anchor="middle">best-practice</text>
    <text x="495" y="476" font-size="9" fill="#cbd5e1" text-anchor="middle">5.2k / 46.5k</text>
  </g>

  <!-- 6 shareAI-lab/learn-claude-code : innov=3, monthly=2.1k, total=54.8k -->
  <g>
    <circle cx="565" cy="455" r="32" fill="#22c55e" opacity="0.6" stroke="#86efac" stroke-width="2"/>
    <text x="565" y="459" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">6</text>
    <text x="700" y="455" font-size="11" fill="#fff" text-anchor="middle">learn-claude-code</text>
    <text x="700" y="469" font-size="9" fill="#cbd5e1" text-anchor="middle">2.1k / 54.8k</text>
  </g>

  <!-- Quadrant divider -->
  <line x1="470" y1="100" x2="470" y2="480" stroke="#334155" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="90" y1="290" x2="850" y2="290" stroke="#334155" stroke-dasharray="3,3" opacity="0.5"/>
</svg>
