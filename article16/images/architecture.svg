<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="700" height="350" fill="url(#bg)"/>
  
  <text x="350" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#818cf8" text-anchor="middle">CopilotKit 架构：如何让你的应用"长"出AI大脑</text>
  
  <!-- Left: React App -->
  <rect x="20" y="50" width="300" height="150" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="170" y="78" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#61dafb" text-anchor="middle">你的 React 应用</text>
  
  <rect x="40" y="92" width="115" height="40" rx="4" fill="#312e81" opacity="0.4"/>
  <text x="97" y="110" font-family="monospace" font-size="10" fill="#a5b4fc" text-anchor="middle">CopilotKit</text>
  <text x="97" y="124" font-family="monospace" font-size="9" fill="#818cf8" text-anchor="middle">Provider</text>
  
  <rect x="170" y="92" width="130" height="40" rx="4" fill="#1e293b" stroke="#334155"/>
  <text x="235" y="110" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">CopilotTextarea</text>
  <text x="235" y="124" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">CopilotChat</text>
  
  <rect x="40" y="145" width="260" height="40" rx="4" fill="#1e293b" stroke="#334155"/>
  <text x="170" y="170" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">自定义 Hooks & Actions</text>
  
  <!-- Arrow -->
  <text x="350" y="130" font-family="Arial, sans-serif" font-size="24" fill="#6366f1" text-anchor="middle">&rarr;</text>
  
  <!-- Middle: CopilotKit Runtime -->
  <rect x="380" y="50" width="300" height="150" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="530" y="78" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#818cf8" text-anchor="middle">CopilotKit 运行时</text>
  
  <rect x="400" y="92" width="260" height="22" rx="3" fill="#312e81"/>
  <text x="530" y="108" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">对话管理 / 上下文 / 流式传输</text>
  
  <rect x="400" y="122" width="260" height="22" rx="3" fill="#312e81"/>
  <text x="530" y="138" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Actions 执行引擎 / 实时协同</text>
  
  <rect x="400" y="152" width="260" height="22" rx="3" fill="#312e81"/>
  <text x="530" y="168" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">LLM 适配 / 记忆管理</text>
  
  <!-- Arrow down -->
  <text x="530" y="220" font-family="Arial, sans-serif" font-size="24" fill="#6366f1" text-anchor="middle">&darr;</text>
  
  <!-- Bottom: LLM Backends -->
  <rect x="200" y="240" width="300" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="350" y="265" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">大模型后端 (可插拔)</text>
  
  <rect x="215" y="280" width="65" height="35" rx="4" fill="#10a37f" opacity="0.3"/>
  <text x="247" y="302" font-family="monospace" font-size="9" fill="#10a37f" text-anchor="middle">OpenAI</text>
  
  <rect x="292" y="280" width="65" height="35" rx="4" fill="#d97706" opacity="0.3"/>
  <text x="324" y="302" font-family="monospace" font-size="9" fill="#d97706" text-anchor="middle">Claude</text>
  
  <rect x="369" y="280" width="65" height="35" rx="4" fill="#4285f4" opacity="0.3"/>
  <text x="401" y="302" font-family="monospace" font-size="9" fill="#4285f4" text-anchor="middle">Gemini</text>
  
  <rect x="446" y="280" width="45" height="35" rx="4" fill="#6366f1" opacity="0.3"/>
  <text x="468" y="302" font-family="monospace" font-size="8" fill="#818cf8" text-anchor="middle">本地</text>
</svg>