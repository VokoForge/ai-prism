<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="700" height="350" fill="url(#bg)"/>
  
  <!-- Comparison table -->
  <rect x="30" y="35" width="640" height="300" rx="8" fill="#0f0f23" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
  
  <!-- Header -->
  <rect x="30" y="35" width="640" height="40" rx="8" fill="#00f0ff" opacity="0.1"/>
  <text x="120" y="60" fill="#00f0ff" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif">对比维度</text>
  <text x="270" y="60" fill="#00f0ff" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif">Hermes Agent</text>
  <text x="440" y="60" fill="#ff2d95" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif">传统AI助手</text>
  
  <!-- Row 1 -->
  <line x1="45" y1="80" x2="655" y2="80" stroke="#333" stroke-width="0.5"/>
  <text x="120" y="100" fill="#ccc" font-size="10" text-anchor="middle" font-family="sans-serif">技能数量</text>
  <text x="270" y="100" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#glow)">118个内置</text>
  <text x="440" y="100" fill="#ff2d95" font-size="10" text-anchor="middle" font-family="sans-serif">仅基础对话</text>
  
  <!-- Row 2 -->
  <line x1="45" y1="115" x2="655" y2="115" stroke="#333" stroke-width="0.5"/>
  <text x="120" y="135" fill="#ccc" font-size="10" text-anchor="middle" font-family="sans-serif">模型支持</text>
  <text x="270" y="135" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#glow)">任意后端模型</text>
  <text x="440" y="135" fill="#ff2d95" font-size="10" text-anchor="middle" font-family="sans-serif">单一模型锁定</text>
  
  <!-- Row 3 -->
  <line x1="45" y1="150" x2="655" y2="150" stroke="#333" stroke-width="0.5"/>
  <text x="120" y="170" fill="#ccc" font-size="10" text-anchor="middle" font-family="sans-serif">开源协议</text>
  <text x="270" y="170" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#glow)">MIT完全自由</text>
  <text x="440" y="170" fill="#ff2d95" font-size="10" text-anchor="middle" font-family="sans-serif">商业许可证</text>
  
  <!-- Row 4 -->
  <line x1="45" y1="185" x2="655" y2="185" stroke="#333" stroke-width="0.5"/>
  <text x="120" y="205" fill="#ccc" font-size="10" text-anchor="middle" font-family="sans-serif">扩展方式</text>
  <text x="270" y="205" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#glow)">插件市场+社区贡献</text>
  <text x="440" y="205" fill="#ff2d95" font-size="10" text-anchor="middle" font-family="sans-serif">官方功能排期</text>
  
  <!-- Row 5 -->
  <line x1="45" y1="220" x2="655" y2="220" stroke="#333" stroke-width="0.5"/>
  <text x="120" y="240" fill="#ccc" font-size="10" text-anchor="middle" font-family="sans-serif">部署方式</text>
  <text x="270" y="240" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#glow)">本地/云端/嵌入</text>
  <text x="440" y="240" fill="#ff2d95" font-size="10" text-anchor="middle" font-family="sans-serif">仅云端</text>
  
  <!-- Row 6 -->
  <line x1="45" y1="255" x2="655" y2="255" stroke="#333" stroke-width="0.5"/>
  <text x="120" y="275" fill="#ccc" font-size="10" text-anchor="middle" font-family="sans-serif">数据隐私</text>
  <text x="270" y="275" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#glow)">完全本地可选</text>
  <text x="440" y="275" fill="#ff2d95" font-size="10" text-anchor="middle" font-family="sans-serif">数据上传服务器</text>
  
  <!-- Row 7 -->
  <line x1="45" y1="290" x2="655" y2="290" stroke="#333" stroke-width="0.5"/>
  <text x="120" y="310" fill="#ccc" font-size="10" text-anchor="middle" font-family="sans-serif">社区规模</text>
  <text x="270" y="310" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#glow)">17.3万星</text>
  <text x="440" y="310" fill="#ff2d95" font-size="10" text-anchor="middle" font-family="sans-serif">--</text>
  
  <!-- Checkmarks -->
  <text x="620" y="100" fill="#00ff88" font-size="12" filter="url(#glow)">✓</text>
  <text x="620" y="135" fill="#00ff88" font-size="12" filter="url(#glow)">✓</text>
  <text x="620" y="170" fill="#00ff88" font-size="12" filter="url(#glow)">✓</text>
  <text x="620" y="205" fill="#00ff88" font-size="12" filter="url(#glow)">✓</text>
  <text x="620" y="240" fill="#00ff88" font-size="12" filter="url(#glow)">✓</text>
  <text x="620" y="275" fill="#00ff88" font-size="12" filter="url(#glow)">✓</text>
  
  <!-- Title -->
  <text x="350" y="22" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle" font-family="sans-serif">Hermes Agent 与传统助手全方位对比</text>
</svg>