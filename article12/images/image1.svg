<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5"/><feMerge><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="700" height="350" fill="url(#bg)"/>
  
  <!-- Central agent -->
  <circle cx="350" cy="175" r="50" fill="#0f0f23" stroke="#00f0ff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="350" cy="175" r="40" fill="#00f0ff" opacity="0.08"/>
  <text x="350" y="170" fill="#00f0ff" font-size="13" font-weight="bold" text-anchor="middle" font-family="sans-serif">Hermes</text>
  <text x="350" y="188" fill="#00f0ff" font-size="9" text-anchor="middle" font-family="sans-serif">Agent</text>
  
  <!-- Skill modules orbiting -->
  <!-- Skill 1: Code -->
  <rect x="80" y="40" width="110" height="50" rx="6" fill="#0f0f23" stroke="#ff2d95" stroke-width="1.2"/>
  <text x="135" y="58" fill="#ff2d95" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">代码编写</text>
  <text x="135" y="76" fill="#ff2d95" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.7">42个技能</text>
  
  <!-- Skill 2: Data -->
  <rect x="510" y="40" width="110" height="50" rx="6" fill="#0f0f23" stroke="#ffcc00" stroke-width="1.2"/>
  <text x="565" y="58" fill="#ffcc00" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">数据处理</text>
  <text x="565" y="76" fill="#ffcc00" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.7">28个技能</text>
  
  <!-- Skill 3: Web -->
  <rect x="550" y="155" width="110" height="50" rx="6" fill="#0f0f23" stroke="#7b2ff7" stroke-width="1.2"/>
  <text x="605" y="173" fill="#7b2ff7" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">网页操控</text>
  <text x="605" y="191" fill="#7b2ff7" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.7">18个技能</text>
  
  <!-- Skill 4: File -->
  <rect x="550" y="260" width="110" height="50" rx="6" fill="#0f0f23" stroke="#00ff88" stroke-width="1.2"/>
  <text x="605" y="278" fill="#00ff88" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">文件管理</text>
  <text x="605" y="296" fill="#00ff88" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.7">15个技能</text>
  
  <!-- Skill 5: API -->
  <rect x="80" y="260" width="110" height="50" rx="6" fill="#0f0f23" stroke="#ff6b35" stroke-width="1.2"/>
  <text x="135" y="278" fill="#ff6b35" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">接口对接</text>
  <text x="135" y="296" fill="#ff6b35" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.7">10个技能</text>
  
  <!-- Skill 6: Security -->
  <rect x="80" y="155" width="110" height="50" rx="6" fill="#0f0f23" stroke="#00f0ff" stroke-width="1.2"/>
  <text x="135" y="173" fill="#00f0ff" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">安全审计</text>
  <text x="135" y="191" fill="#00f0ff" font-size="8" text-anchor="middle" font-family="sans-serif" opacity="0.7">5个技能</text>
  
  <!-- Connecting lines -->
  <line x1="190" y1="90" x2="300" y2="140" stroke="#ff2d95" stroke-width="0.5" opacity="0.3"/>
  <line x1="510" y1="90" x2="400" y2="140" stroke="#ffcc00" stroke-width="0.5" opacity="0.3"/>
  <line x1="550" y1="180" x2="400" y2="180" stroke="#7b2ff7" stroke-width="0.5" opacity="0.3"/>
  <line x1="550" y1="285" x2="400" y2="210" stroke="#00ff88" stroke-width="0.5" opacity="0.3"/>
  <line x1="190" y1="285" x2="300" y2="210" stroke="#ff6b35" stroke-width="0.5" opacity="0.3"/>
  <line x1="190" y1="180" x2="300" y2="180" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Legend -->
  <rect x="220" y="290" width="260" height="45" rx="6" fill="#0f0f23" stroke="#555" stroke-width="0.5"/>
  <circle cx="235" cy="310" r="4" fill="#ff2d95"/>
  <text x="245" y="313" fill="#aaa" font-size="8" font-family="sans-serif">内置 118</text>
  <circle cx="310" cy="310" r="4" fill="#00f0ff"/>
  <text x="320" y="313" fill="#aaa" font-size="8" font-family="sans-serif">社区 500+</text>
  <circle cx="400" cy="310" r="4" fill="#00ff88"/>
  <text x="410" y="313" fill="#aaa" font-size="8" font-family="sans-serif">MIT协议</text>
  
  <!-- Title -->
  <text x="350" y="20" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">Hermes Agent 技能生态全景图</text>
</svg>