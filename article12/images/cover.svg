<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="skill1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d95;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="skill2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="skill3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Orbit rings -->
  <circle cx="400" cy="200" r="160" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="400" cy="200" r="120" fill="none" stroke="#7b2ff7" stroke-width="0.5" opacity="0.12"/>
  <circle cx="400" cy="200" r="80" fill="none" stroke="#ff2d95" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Connection lines from center to skills -->
  <line x1="400" y1="200" x2="560" y2="80" stroke="#00f0ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="400" y1="200" x2="240" y2="80" stroke="#7b2ff7" stroke-width="0.8" opacity="0.2"/>
  <line x1="400" y1="200" x2="400" y2="350" stroke="#ff2d95" stroke-width="0.8" opacity="0.2"/>
  <line x1="400" y1="200" x2="560" y2="320" stroke="#00ff88" stroke-width="0.8" opacity="0.2"/>
  <line x1="400" y1="200" x2="240" y2="320" stroke="#ffcc00" stroke-width="0.8" opacity="0.2"/>
  <line x1="400" y1="200" x2="160" y2="200" stroke="#00f0ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="400" y1="200" x2="640" y2="200" stroke="#7b2ff7" stroke-width="0.8" opacity="0.2"/>
  
  <!-- Skill module nodes -->
  <!-- Top Right -->
  <rect x="530" y="50" width="80" height="50" rx="8" fill="#0f0f23" stroke="#ff2d95" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="570" y="72" fill="#ff2d95" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">代码生成</text>
  <text x="570" y="88" fill="#ff6b35" font-size="8" text-anchor="middle" font-family="sans-serif">Skill</text>
  
  <!-- Top Left -->
  <rect x="190" y="50" width="80" height="50" rx="8" fill="#0f0f23" stroke="#00f0ff" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="230" y="72" fill="#00f0ff" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">数据分析</text>
  <text x="230" y="88" fill="#00f0ff" font-size="8" text-anchor="middle" font-family="sans-serif">Skill</text>
  
  <!-- Right -->
  <rect x="610" y="175" width="80" height="50" rx="8" fill="#0f0f23" stroke="#7b2ff7" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="650" y="197" fill="#7b2ff7" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">网页操作</text>
  <text x="650" y="213" fill="#7b2ff7" font-size="8" text-anchor="middle" font-family="sans-serif">Skill</text>
  
  <!-- Bottom Right -->
  <rect x="530" y="300" width="80" height="50" rx="8" fill="#0f0f23" stroke="#00ff88" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="570" y="322" fill="#00ff88" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">文件管理</text>
  <text x="570" y="338" fill="#00cc66" font-size="8" text-anchor="middle" font-family="sans-serif">Skill</text>
  
  <!-- Bottom Left -->
  <rect x="190" y="300" width="80" height="50" rx="8" fill="#0f0f23" stroke="#ffcc00" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="230" y="322" fill="#ffcc00" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">API集成</text>
  <text x="230" y="338" fill="#ff9900" font-size="8" text-anchor="middle" font-family="sans-serif">Skill</text>
  
  <!-- Left -->
  <rect x="110" y="175" width="80" height="50" rx="8" fill="#0f0f23" stroke="#00f0ff" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="150" y="197" fill="#00f0ff" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">安全审计</text>
  <text x="150" y="213" fill="#00f0ff" font-size="8" text-anchor="middle" font-family="sans-serif">Skill</text>
  
  <!-- Center Agent Core -->
  <circle cx="400" cy="200" r="55" fill="#0f0f23" stroke="url(#core)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="400" cy="200" r="45" fill="url(#core)" opacity="0.15"/>
  <text x="400" y="192" fill="#00f0ff" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif" filter="url(#glow)">Agent</text>
  <text x="400" y="212" fill="#00f0ff" font-size="9" text-anchor="middle" font-family="sans-serif">核心调度</text>
  
  <!-- Small orbiting particles -->
  <circle cx="400" cy="40" r="2" fill="#00f0ff" opacity="0.6"/>
  <circle cx="555" cy="90" r="2" fill="#7b2ff7" opacity="0.6"/>
  <circle cx="555" cy="310" r="2" fill="#00ff88" opacity="0.6"/>
  <circle cx="245" cy="310" r="2" fill="#ffcc00" opacity="0.6"/>
  <circle cx="245" cy="90" r="2" fill="#ff2d95" opacity="0.6"/>
  
  <!-- Title -->
  <text x="400" y="45" fill="#ffffff" font-size="22" font-weight="bold" text-anchor="middle" font-family="sans-serif">17.3万星！118个内置技能的超级代理</text>
  <text x="400" y="70" fill="#00f0ff" font-size="14" text-anchor="middle" font-family="sans-serif" opacity="0.8">MIT协议开源 · 500+社区贡献 · 任意模型后端</text>
</svg>