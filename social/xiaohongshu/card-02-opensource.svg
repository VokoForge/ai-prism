<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1440" fill="url(#bg2)"/>

  <!-- Ambient glow -->
  <ellipse cx="850" cy="200" rx="280" ry="280" fill="#ec4899" opacity="0.07" filter="url(#blur2)"/>
  <ellipse cx="200" cy="1100" rx="250" ry="250" fill="#f59e0b" opacity="0.05" filter="url(#blur2)"/>
  <ellipse cx="540" cy="700" rx="200" ry="200" fill="#6366f1" opacity="0.06" filter="url(#blur2)"/>

  <!-- Top decorative line -->
  <rect x="80" y="80" width="120" height="4" rx="2" fill="url(#accent2)"/>

  <!-- Tag -->
  <rect x="80" y="110" width="180" height="36" rx="18" fill="#ec4899" fill-opacity="0.2" stroke="#ec4899" stroke-width="1"/>
  <text x="170" y="134" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#f9a8d4" text-anchor="middle" font-weight="500">DAY 16 · 外部棱镜</text>

  <!-- Main Title -->
  <text x="80" y="260" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="64" fill="#ffffff" font-weight="800" letter-spacing="-1">
    <tspan x="80" dy="0">2026最值得关注的</tspan>
    <tspan x="80" dy="85">3个AI开源项目</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="440" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8" font-weight="400">GitHub Trending 屠榜 · Agent Skills 生态爆发</text>

  <!-- Divider -->
  <rect x="80" y="480" width="920" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Card 1: TurboVec -->
  <rect x="80" y="520" width="920" height="220" rx="20" fill="url(#cardGrad1)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="80" y="520" width="6" height="220" rx="3" fill="#6366f1"/>
  <text x="120" y="575" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="36" fill="#a5b4fc" font-weight="800">TurboVec</text>
  <rect x="360" y="555" width="100" height="28" rx="14" fill="#6366f1" fill-opacity="0.3"/>
  <text x="410" y="574" font-family="'SF Pro Display',sans-serif" font-size="14" fill="#a5b4fc" text-anchor="middle" font-weight="600">7600+ ⭐</text>
  <text x="120" y="625" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="26" fill="#ffffff" font-weight="700">向量搜索的 Rust 火箭 🚀</text>
  <text x="120" y="665" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="20" fill="#94a3b8">Rust 重写核心 · 搜索速度提升 10-100x</text>
  <text x="120" y="700" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="20" fill="#94a3b8">"量化即索引" — CPU缓存命中率接近100%</text>

  <!-- Card 2: CopilotKit -->
  <rect x="80" y="770" width="920" height="220" rx="20" fill="url(#cardGrad2)" stroke="#ec4899" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="80" y="770" width="6" height="220" rx="3" fill="#ec4899"/>
  <text x="120" y="825" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="36" fill="#f9a8d4" font-weight="800">CopilotKit</text>
  <rect x="380" y="805" width="110" height="28" rx="14" fill="#ec4899" fill-opacity="0.3"/>
  <text x="435" y="824" font-family="'SF Pro Display',sans-serif" font-size="14" fill="#f9a8d4" text-anchor="middle" font-weight="600">日增 +613⭐</text>
  <text x="120" y="875" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="26" fill="#ffffff" font-weight="700">Agent UI 的 React 基础设施 ⚡</text>
  <text x="120" y="915" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="20" fill="#94a3b8">前端即 Agent 控制面 · 流式+工具调用+审批</text>
  <text x="120" y="950" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="20" fill="#94a3b8">Agent差异化不在"能做什么"，在"怎么让人参与"</text>

  <!-- Card 3: open-notebook -->
  <rect x="80" y="1020" width="920" height="220" rx="20" fill="url(#cardGrad3)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="80" y="1020" width="6" height="220" rx="3" fill="#f59e0b"/>
  <text x="120" y="1075" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="36" fill="#fcd34d" font-weight="800">open-notebook</text>
  <rect x="430" y="1055" width="110" height="28" rx="14" fill="#f59e0b" fill-opacity="0.3"/>
  <text x="485" y="1074" font-family="'SF Pro Display',sans-serif" font-size="14" fill="#fcd34d" text-anchor="middle" font-weight="600">日增 +783⭐</text>
  <text x="120" y="1125" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="26" fill="#ffffff" font-weight="700">知识蒸馏的 Agent 工作台 📚</text>
  <text x="120" y="1165" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="20" fill="#94a3b8">DAG 工作流 · 读论文→提取洞察→生成笔记</text>
  <text x="120" y="1200" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="20" fill="#94a3b8">这才是RAG该有的样子：检索→理解→重构</text>

  <!-- Bottom watermark -->
  <rect x="80" y="1310" width="920" height="1" fill="#ffffff" fill-opacity="0.06"/>
  <text x="540" y="1370" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="24" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="6">AI 棱 镜</text>
  <text x="540" y="1400" font-family="'SF Pro Display',sans-serif" font-size="14" fill="#334155" text-anchor="middle" letter-spacing="3">AI PRISM · DAILY INSIGHTS</text>
</svg>