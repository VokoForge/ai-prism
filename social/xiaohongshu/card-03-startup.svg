<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1440" fill="url(#bg3)"/>

  <!-- Ambient glow -->
  <ellipse cx="800" cy="400" rx="300" ry="300" fill="#ef4444" opacity="0.06" filter="url(#blur3)"/>
  <ellipse cx="250" cy="1000" rx="250" ry="250" fill="#f59e0b" opacity="0.06" filter="url(#blur3)"/>
  <ellipse cx="540" cy="700" rx="180" ry="180" fill="#ec4899" opacity="0.04" filter="url(#blur3)"/>

  <!-- Top decorative line -->
  <rect x="80" y="80" width="120" height="4" rx="2" fill="url(#accent3)"/>

  <!-- Tag -->
  <rect x="80" y="110" width="180" height="36" rx="18" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="170" y="134" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#fca5a5" text-anchor="middle" font-weight="500">STARTUP SIGNAL</text>

  <!-- Main Title -->
  <text x="80" y="280" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="72" fill="#ffffff" font-weight="800" letter-spacing="-2">
    <tspan x="80" dy="0">AI创业的</tspan>
    <tspan x="80" dy="90">3个死法</tspan>
  </text>

  <!-- Red accent number -->
  <text x="680" y="310" font-family="'SF Pro Display',sans-serif" font-size="160" fill="#ef4444" fill-opacity="0.15" font-weight="900">90%</text>

  <!-- Subtitle -->
  <text x="80" y="440" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="24" fill="#fca5a5" font-weight="600">90% 的AI创业团队都踩了这些坑</text>

  <!-- Divider -->
  <rect x="80" y="480" width="920" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Death 1 -->
  <g transform="translate(80, 530)">
    <rect width="920" height="200" rx="20" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2"/>
    <text x="40" y="60" font-family="'SF Pro Display',sans-serif" font-size="72" fill="#ef4444" fill-opacity="0.3" font-weight="900">01</text>
    <text x="140" y="60" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="32" fill="#ffffff" font-weight="700">有技术无商业 💀</text>
    <text x="40" y="110" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8">AI硬件团队Demo惊艳，3个月只卖200台</text>
    <text x="40" y="150" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8">定价2999，用户心理价位599 — 不会做GTM</text>
    <text x="40" y="185" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="18" fill="#fca5a5" font-style="italic">京东AI硬件选秀暴露的核心痛点</text>
  </g>

  <!-- Death 2 -->
  <g transform="translate(80, 760)">
    <rect width="920" height="200" rx="20" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2"/>
    <text x="40" y="60" font-family="'SF Pro Display',sans-serif" font-size="72" fill="#f59e0b" fill-opacity="0.3" font-weight="900">02</text>
    <text x="140" y="60" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="32" fill="#ffffff" font-weight="700">把AI当银弹 🎯</text>
    <text x="40" y="110" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8">对AI的预期脱离现实 — "AI精神病"</text>
    <text x="40" y="150" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8">把AI当银弹的组织，最后都会被银弹反噬</text>
    <text x="40" y="185" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="18" fill="#fcd34d" font-style="italic">— HashiCorp创始人 Mitchell Hashimoto</text>
  </g>

  <!-- Death 3 -->
  <g transform="translate(80, 990)">
    <rect width="920" height="200" rx="20" fill="#ec4899" fill-opacity="0.06" stroke="#ec4899" stroke-width="1" stroke-opacity="0.2"/>
    <text x="40" y="60" font-family="'SF Pro Display',sans-serif" font-size="72" fill="#ec4899" fill-opacity="0.3" font-weight="900">03</text>
    <text x="140" y="60" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="32" fill="#ffffff" font-weight="700">卷模型不卷落地 📉</text>
    <text x="40" y="110" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8">2026竞争主轴：谁的检索快、技能多、落地狠</text>
    <text x="40" y="150" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8">护城河不在模型，在供应链和渠道</text>
    <text x="40" y="185" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="18" fill="#f9a8d4" font-style="italic">做硬件至少配一个做过消费电子的合伙人</text>
  </g>

  <!-- Bottom watermark -->
  <rect x="80" y="1310" width="920" height="1" fill="#ffffff" fill-opacity="0.06"/>
  <text x="540" y="1370" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="24" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="6">AI 棱 镜</text>
  <text x="540" y="1400" font-family="'SF Pro Display',sans-serif" font-size="14" fill="#334155" text-anchor="middle" letter-spacing="3">AI PRISM · DAILY INSIGHTS</text>
</svg>