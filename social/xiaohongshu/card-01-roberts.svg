<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1440" fill="url(#bg1)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="200" cy="300" rx="300" ry="300" fill="#6366f1" opacity="0.08" filter="url(#blur1)"/>
  <ellipse cx="880" cy="900" rx="250" ry="250" fill="#ec4899" opacity="0.06" filter="url(#blur1)"/>
  <ellipse cx="540" cy="1200" rx="200" ry="200" fill="#f59e0b" opacity="0.05" filter="url(#blur1)"/>

  <!-- Top decorative line -->
  <rect x="80" y="80" width="120" height="4" rx="2" fill="url(#accent1)"/>

  <!-- Tag -->
  <rect x="80" y="110" width="160" height="36" rx="18" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-width="1"/>
  <text x="160" y="134" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="16" fill="#a5b4fc" text-anchor="middle" font-weight="500">ROBERTS 系列</text>

  <!-- Main Title -->
  <text x="80" y="260" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="72" fill="#ffffff" font-weight="800" letter-spacing="-2">
    <tspan x="80" dy="0">一个人+7个AI</tspan>
    <tspan x="80" dy="90">员工</tspan>
  </text>

  <!-- Big number highlight -->
  <text x="80" y="500" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="120" fill="url(#accent1)" font-weight="900" letter-spacing="-4">¥6,300</text>
  <text x="580" y="500" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="36" fill="#94a3b8" font-weight="400">/月</text>

  <!-- Divider -->
  <rect x="80" y="560" width="920" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Key Points -->
  <g transform="translate(80, 640)">
    <!-- Point 1 -->
    <circle cx="16" cy="16" r="16" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-width="1.5"/>
    <text x="16" y="22" font-family="'SF Pro Display',sans-serif" font-size="16" fill="#a5b4fc" text-anchor="middle" font-weight="700">1</text>
    <text x="52" y="14" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="32" fill="#ffffff" font-weight="700">人力成本降 70%</text>
    <text x="52" y="50" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8" font-weight="400">3个活人 → 7个AI Agent，交付周期缩短60%</text>

    <!-- Point 2 -->
    <circle cx="16" cy="136" r="16" fill="#ec4899" fill-opacity="0.2" stroke="#ec4899" stroke-width="1.5"/>
    <text x="16" y="142" font-family="'SF Pro Display',sans-serif" font-size="16" fill="#f9a8d4" text-anchor="middle" font-weight="700">2</text>
    <text x="52" y="134" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="32" fill="#ffffff" font-weight="700">伙伴思维 > 工具思维</text>
    <text x="52" y="170" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8" font-weight="400">把AI当伙伴，它才能成为伙伴，不是工具</text>

    <!-- Point 3 -->
    <circle cx="16" cy="256" r="16" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="16" y="262" font-family="'SF Pro Display',sans-serif" font-size="16" fill="#fcd34d" text-anchor="middle" font-weight="700">3</text>
    <text x="52" y="254" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="32" fill="#ffffff" font-weight="700">混合沟通 = 效率密码</text>
    <text x="52" y="290" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="22" fill="#94a3b8" font-weight="400">精确任务用CLI，开放问题用自然语言</text>
  </g>

  <!-- Quote box -->
  <rect x="80" y="1060" width="920" height="140" rx="16" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <text x="120" y="1110" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="26" fill="#c7d2fe" font-weight="400" font-style="italic">
    <tspan x="120" dy="0">"AI Agent团队不是人类的替代品，</tspan>
    <tspan x="120" dy="40">而是人类能力的放大器。"</tspan>
  </text>

  <!-- Bottom watermark -->
  <rect x="80" y="1310" width="920" height="1" fill="#ffffff" fill-opacity="0.06"/>
  <text x="540" y="1370" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="24" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="6">AI 棱 镜</text>
  <text x="540" y="1400" font-family="'SF Pro Display',sans-serif" font-size="14" fill="#334155" text-anchor="middle" letter-spacing="3">AI PRISM · DAILY INSIGHTS</text>
</svg>