<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- Code knowledge graph -->
  <g transform="translate(450, 240)" filter="url(#glow)">
    <!-- Central AI node -->
    <circle cx="0" cy="0" r="45" fill="#16213e" stroke="#e94560" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif" font-weight="bold">AI</text>
    <text x="0" y="10" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif">CodeGraph</text>
    
    <!-- Code file nodes -->
    <g>
      <rect x="-180" y="-80" width="55" height="30" rx="5" fill="#16213e" stroke="#00d9ff" stroke-width="2"/>
      <text x="-152" y="-60" text-anchor="middle" fill="#00d9ff" font-size="9" font-family="sans-serif">auth.ts</text>
      <line x1="-125" y1="-65" x2="-42" y2="-20" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
      
      <rect x="130" y="-90" width="55" height="30" rx="5" fill="#16213e" stroke="#00ff88" stroke-width="2"/>
      <text x="157" y="-70" text-anchor="middle" fill="#00ff88" font-size="9" font-family="sans-serif">user.ts</text>
      <line x1="130" y1="-75" x2="42" y2="-20" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
      
      <rect x="-200" y="30" width="55" height="30" rx="5" fill="#16213e" stroke="#ffd700" stroke-width="2"/>
      <text x="-172" y="50" text-anchor="middle" fill="#ffd700" font-size="9" font-family="sans-serif">api.ts</text>
      <line x1="-145" y1="45" x2="-42" y2="15" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
      
      <rect x="150" y="40" width="60" height="30" rx="5" fill="#16213e" stroke="#a855f7" stroke-width="2"/>
      <text x="180" y="60" text-anchor="middle" fill="#a855f7" font-size="9" font-family="sans-serif">db.ts</text>
      <line x1="150" y1="55" x2="42" y2="15" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
      
      <rect x="-120" y="110" width="70" height="30" rx="5" fill="#16213e" stroke="#ff6b6b" stroke-width="2"/>
      <text x="-85" y="130" text-anchor="middle" fill="#ff6b6b" font-size="9" font-family="sans-serif">utils.ts</text>
      <line x1="-50" y1="110" x2="-20" y2="42" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
      
      <rect x="60" y="120" width="70" height="30" rx="5" fill="#16213e" stroke="#00d9ff" stroke-width="2"/>
      <text x="95" y="140" text-anchor="middle" fill="#00d9ff" font-size="9" font-family="sans-serif">config.ts</text>
      <line x1="60" y1="120" x2="20" y2="42" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
    </g>
    
    <!-- Connection lines between files -->
    <g opacity="0.3">
      <line x1="-125" y1="-65" x2="130" y2="-75" stroke="#fff" stroke-width="1"/>
      <line x1="-145" y1="45" x2="150" y2="55" stroke="#fff" stroke-width="1"/>
      <line x1="-125" y1="-65" x2="-145" y2="45" stroke="#fff" stroke-width="1"/>
      <line x1="130" y1="-75" x2="150" y2="55" stroke="#fff" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="450" y="430" text-anchor="middle" fill="#fff" font-size="28" font-family="sans-serif" font-weight="bold" filter="url(#glow)">CodeGraph</text>
  <text x="450" y="460" text-anchor="middle" fill="#e94560" font-size="16" font-family="sans-serif">代码知识图谱 | 48K Star</text>
</svg>