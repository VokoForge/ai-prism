<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  
  <text x="400" y="40" text-anchor="middle" fill="#00d9ff" font-size="22" font-family="sans-serif" font-weight="bold">CodeGraph 生成的 5 种代码图谱</text>
  
  <!-- Type 1: Symbol Graph -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="220" height="140" rx="10" fill="url(#nodeGrad)" stroke="#00d9ff" stroke-width="2"/>
    <text x="110" y="25" text-anchor="middle" fill="#00d9ff" font-size="13" font-family="sans-serif" font-weight="bold">1. 符号关系图</text>
    <circle cx="60" cy="70" r="15" fill="#16213e" stroke="#00d9ff" stroke-width="1.5"/>
    <text x="60" y="75" text-anchor="middle" fill="#00d9ff" font-size="8" font-family="sans-serif">User</text>
    <circle cx="160" cy="70" r="15" fill="#16213e" stroke="#00d9ff" stroke-width="1.5"/>
    <text x="160" y="75" text-anchor="middle" fill="#00d9ff" font-size="8" font-family="sans-serif">Auth</text>
    <line x1="75" y1="70" x2="145" y2="70" stroke="#00d9ff" stroke-width="1.5"/>
    <text x="110" y="110" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">类、函数、变量关系</text>
  </g>
  
  <!-- Type 2: Call Graph -->
  <g transform="translate(290, 80)">
    <rect x="0" y="0" width="220" height="140" rx="10" fill="url(#nodeGrad)" stroke="#e94560" stroke-width="2"/>
    <text x="110" y="25" text-anchor="middle" fill="#e94560" font-size="13" font-family="sans-serif" font-weight="bold">2. 调用关系图</text>
    <rect x="70" y="50" width="80" height="25" rx="5" fill="#16213e" stroke="#e94560" stroke-width="1"/>
    <text x="110" y="67" text-anchor="middle" fill="#e94560" font-size="9" font-family="sans-serif">login()</text>
    <rect x="30" y="95" width="70" height="25" rx="5" fill="#16213e" stroke="#e94560" stroke-width="1"/>
    <text x="65" y="112" text-anchor="middle" fill="#e94560" font-size="9" font-family="sans-serif">auth()</text>
    <rect x="120" y="95" width="70" height="25" rx="5" fill="#16213e" stroke="#e94560" stroke-width="1"/>
    <text x="155" y="112" text-anchor="middle" fill="#e94560" font-size="9" font-family="sans-serif">log()</text>
    <line x1="95" y1="75" x2="65" y2="95" stroke="#e94560" stroke-width="1"/>
    <line x1="125" y1="75" x2="155" y2="95" stroke="#e94560" stroke-width="1"/>
  </g>
  
  <!-- Type 3: Dependency Graph -->
  <g transform="translate(530, 80)">
    <rect x="0" y="0" width="220" height="140" rx="10" fill="url(#nodeGrad)" stroke="#ffd700" stroke-width="2"/>
    <text x="110" y="25" text-anchor="middle" fill="#ffd700" font-size="13" font-family="sans-serif" font-weight="bold">3. 依赖关系图</text>
    <rect x="80" y="50" width="60" height="25" rx="5" fill="#16213e" stroke="#ffd700" stroke-width="1"/>
    <text x="110" y="67" text-anchor="middle" fill="#ffd700" font-size="9" font-family="sans-serif">App.tsx</text>
    <rect x="30" y="95" width="60" height="25" rx="5" fill="#16213e" stroke="#ffd700" stroke-width="1"/>
    <text x="60" y="112" text-anchor="middle" fill="#ffd700" font-size="9" font-family="sans-serif">utils.ts</text>
    <rect x="130" y="95" width="60" height="25" rx="5" fill="#16213e" stroke="#ffd700" stroke-width="1"/>
    <text x="160" y="112" text-anchor="middle" fill="#ffd700" font-size="9" font-family="sans-serif">api.ts</text>
    <line x1="95" y1="75" x2="60" y2="95" stroke="#ffd700" stroke-width="1"/>
    <line x1="125" y1="75" x2="160" y2="95" stroke="#ffd700" stroke-width="1"/>
  </g>
  
  <!-- Type 4: Inheritance Graph -->
  <g transform="translate(170, 250)">
    <rect x="0" y="0" width="220" height="140" rx="10" fill="url(#nodeGrad)" stroke="#00ff88" stroke-width="2"/>
    <text x="110" y="25" text-anchor="middle" fill="#00ff88" font-size="13" font-family="sans-serif" font-weight="bold">4. 继承关系图</text>
    <rect x="60" y="50" width="100" height="25" rx="5" fill="#16213e" stroke="#00ff88" stroke-width="1"/>
    <text x="110" y="67" text-anchor="middle" fill="#00ff88" font-size="9" font-family="sans-serif">BaseController</text>
    <rect x="20" y="100" width="80" height="25" rx="5" fill="#16213e" stroke="#00ff88" stroke-width="1"/>
    <text x="60" y="117" text-anchor="middle" fill="#00ff88" font-size="9" font-family="sans-serif">UserCtrl</text>
    <rect x="120" y="100" width="80" height="25" rx="5" fill="#16213e" stroke="#00ff88" stroke-width="1"/>
    <text x="160" y="117" text-anchor="middle" fill="#00ff88" font-size="9" font-family="sans-serif">AuthCtrl</text>
    <line x1="80" y1="75" x2="60" y2="100" stroke="#00ff88" stroke-width="1"/>
    <line x1="140" y1="75" x2="160" y2="100" stroke="#00ff88" stroke-width="1"/>
  </g>
  
  <!-- Type 5: Module Graph -->
  <g transform="translate(410, 250)">
    <rect x="0" y="0" width="220" height="140" rx="10" fill="url(#nodeGrad)" stroke="#a855f7" stroke-width="2"/>
    <text x="110" y="25" text-anchor="middle" fill="#a855f7" font-size="13" font-family="sans-serif" font-weight="bold">5. 模块关系图</text>
    <rect x="30" y="55" width="55" height="30" rx="5" fill="#16213e" stroke="#a855f7" stroke-width="1"/>
    <text x="57" y="75" text-anchor="middle" fill="#a855f7" font-size="8" font-family="sans-serif">auth</text>
    <rect x="100" y="55" width="55" height="30" rx="5" fill="#16213e" stroke="#a855f7" stroke-width="1"/>
    <text x="127" y="75" text-anchor="middle" fill="#a855f7" font-size="8" font-family="sans-serif">user</text>
    <rect x="65" y="105" width="55" height="30" rx="5" fill="#16213e" stroke="#a855f7" stroke-width="1"/>
    <text x="92" y="125" text-anchor="middle" fill="#a855f7" font-size="8" font-family="sans-serif">db</text>
    <line x1="85" y1="85" x2="100" y2="105" stroke="#a855f7" stroke-width="1"/>
    <line x1="127" y1="85" x2="110" y2="105" stroke="#a855f7" stroke-width="1"/>
  </g>
</svg>