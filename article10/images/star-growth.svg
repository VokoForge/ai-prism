<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="350" fill="url(#bgGrad)"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#00d9ff" font-size="20" font-family="sans-serif" font-weight="bold">CodeGraph Star 增长趋势</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="280" x2="720" y2="280" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="220" x2="720" y2="220" stroke="#333" stroke-width="0.5" stroke-dasharray="5,5"/>
  <line x1="80" y1="160" x2="720" y2="160" stroke="#333" stroke-width="0.5" stroke-dasharray="5,5"/>
  <line x1="80" y1="100" x2="720" y2="100" stroke="#333" stroke-width="0.5" stroke-dasharray="5,5"/>
  
  <!-- Y axis labels -->
  <text x="70" y="285" text-anchor="end" fill="#888" font-size="10" font-family="sans-serif">0</text>
  <text x="70" y="225" text-anchor="end" fill="#888" font-size="10" font-family="sans-serif">20K</text>
  <text x="70" y="165" text-anchor="end" fill="#888" font-size="10" font-family="sans-serif">40K</text>
  <text x="70" y="105" text-anchor="end" fill="#888" font-size="10" font-family="sans-serif">60K</text>
  
  <!-- X axis labels -->
  <text x="80" y="305" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif">1月</text>
  <text x="240" y="305" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif">2月</text>
  <text x="400" y="305" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif">3月</text>
  <text x="560" y="305" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif">4月</text>
  <text x="720" y="305" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif">5月</text>
  
  <!-- Growth line -->
  <polyline points="80,280 160,275 240,268 320,260 400,240 480,200 560,150 640,120 720,100" 
            fill="none" stroke="url(#lineGrad)" stroke-width="3"/>
  
  <!-- Data points -->
  <circle cx="80" cy="280" r="5" fill="#00d9ff"/>
  <circle cx="160" cy="275" r="5" fill="#00d9ff"/>
  <circle cx="240" cy="268" r="5" fill="#00d9ff"/>
  <circle cx="320" cy="260" r="5" fill="#00d9ff"/>
  <circle cx="400" cy="240" r="5" fill="#ffd700"/>
  <circle cx="480" cy="200" r="5" fill="#ffd700"/>
  <circle cx="560" cy="150" r="5" fill="#e94560"/>
  <circle cx="640" cy="120" r="6" fill="#e94560"/>
  <circle cx="720" cy="100" r="7" fill="#e94560"/>
  
  <!-- Annotations -->
  <text x="560" y="130" text-anchor="middle" fill="#e94560" font-size="11" font-family="sans-serif" font-weight="bold">5月爆发！</text>
  <text x="720" y="85" text-anchor="middle" fill="#e94560" font-size="11" font-family="sans-serif" font-weight="bold">48K</text>
  
  <!-- Key events -->
  <text x="400" y="335" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">1月创建 → 3月 MCP 集成 → 5月爆发增长（+46K/月）</text>
</svg>