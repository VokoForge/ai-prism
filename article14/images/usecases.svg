<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="700" height="350" fill="url(#bg)"/>
  
  <text x="350" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#58a6ff" text-anchor="middle">世界模型三大核心应用场景</text>
  
  <!-- Scene 1: Robot Training -->
  <rect x="20" y="45" width="210" height="280" rx="8" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="125" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#76b900" text-anchor="middle">机器人训练</text>
  <!-- Robot arm -->
  <line x1="75" y1="130" x2="175" y2="130" stroke="#a855f7" stroke-width="4"/>
  <line x1="175" y1="130" x2="175" y2="180" stroke="#a855f7" stroke-width="4"/>
  <circle cx="175" cy="185" r="10" fill="none" stroke="#c084fc" stroke-width="2"/>
  <rect x="55" y="115" width="30" height="30" rx="3" fill="#a855f7" opacity="0.3"/>
  <text x="125" y="220" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">虚拟环境成千上万次试错</text>
  <text x="125" y="238" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">学会抓取/堆叠/拧螺丝</text>
  <text x="125" y="256" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">零样本迁移到真实机械臂</text>
  <rect x="45" y="275" width="160" height="35" rx="4" fill="#0d2b1e"/>
  <text x="125" y="296" font-family="Arial, sans-serif" font-size="11" fill="#76b900" text-anchor="middle" font-weight="bold">成本降低90%+</text>
  
  <!-- Scene 2: Autonomous Driving -->
  <rect x="245" y="45" width="210" height="280" rx="8" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="350" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#79c0ff" text-anchor="middle">自动驾驶</text>
  <!-- Road -->
  <rect x="265" y="105" width="170" height="3" fill="#30363d"/>
  <rect x="265" y="125" width="170" height="3" fill="#30363d"/>
  <rect x="265" y="145" width="170" height="3" fill="#30363d"/>
  <!-- Car -->
  <rect x="330" y="112" width="30" height="20" rx="3" fill="#79c0ff" opacity="0.6"/>
  <circle cx="338" cy="135" r="4" fill="#79c0ff"/>
  <circle cx="355" cy="135" r="4" fill="#79c0ff"/>
  <!-- Obstacles -->
  <rect x="290" y="110" width="15" height="15" rx="2" fill="#d29922" opacity="0.5"/>
  <rect x="400" y="115" width="12" height="15" rx="2" fill="#d29922" opacity="0.5"/>
  <text x="350" y="175" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">生成暴雨/暴雪/夜间</text>
  <text x="350" y="193" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">等极端罕见场景数据</text>
  <text x="350" y="211" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">覆盖长尾边缘案例</text>
  <rect x="270" y="275" width="160" height="35" rx="4" fill="#0d2b1e"/>
  <text x="350" y="296" font-family="Arial, sans-serif" font-size="11" fill="#79c0ff" text-anchor="middle" font-weight="bold">安全性提升10倍+</text>
  
  <!-- Scene 3: Video Generation -->
  <rect x="470" y="45" width="210" height="280" rx="8" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="575" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0883e" text-anchor="middle">视频生成</text>
  <!-- Film strip -->
  <rect x="490" y="100" width="170" height="80" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="498" y="108" width="36" height="22" rx="2" fill="#f0883e" opacity="0.3"/>
  <rect x="540" y="108" width="36" height="22" rx="2" fill="#f0883e" opacity="0.3"/>
  <rect x="582" y="108" width="36" height="22" rx="2" fill="#f0883e" opacity="0.3"/>
  <rect x="624" y="108" width="28" height="22" rx="2" fill="#f0883e" opacity="0.3"/>
  <rect x="498" y="136" width="36" height="22" rx="2" fill="#f0883e" opacity="0.15"/>
  <rect x="540" y="136" width="36" height="22" rx="2" fill="#f0883e" opacity="0.15"/>
  <rect x="582" y="136" width="36" height="22" rx="2" fill="#f0883e" opacity="0.15"/>
  <rect x="624" y="136" width="28" height="22" rx="2" fill="#f0883e" opacity="0.15"/>
  <text x="575" y="200" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">文字生成高保真视频</text>
  <text x="575" y="218" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">物理规律自动遵守</text>
  <text x="575" y="236" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">光影/重力/碰撞真实</text>
  <rect x="495" y="275" width="160" height="35" rx="4" fill="#0d2b1e"/>
  <text x="575" y="296" font-family="Arial, sans-serif" font-size="11" fill="#f0883e" text-anchor="middle" font-weight="bold">比传统CG快100倍</text>
</svg>