<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="nvidiaGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="100%" style="stop-color:#5a9e00"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Grid lines - virtual world -->
  <g opacity="0.15" stroke="#00ffff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="550" y1="0" x2="550" y2="400"/>
    <line x1="650" y1="0" x2="650" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
  </g>
  
  <!-- Left side - Virtual world (cyan/blue) -->
  <circle cx="200" cy="180" r="80" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <circle cx="200" cy="180" r="55" fill="none" stroke="#00aaff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="180" r="30" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.7"/>
  
  <!-- Data nodes in virtual world -->
  <circle cx="170" cy="150" r="4" fill="#00ffff" filter="url(#glow)"/>
  <circle cx="230" cy="150" r="4" fill="#00ffff" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="4" fill="#00ffff" filter="url(#glow)"/>
  <circle cx="160" cy="185" r="3" fill="#00aaff"/>
  <circle cx="240" cy="185" r="3" fill="#00aaff"/>
  
  <!-- Data streams -->
  <line x1="170" y1="150" x2="200" y2="200" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
  <line x1="230" y1="150" x2="200" y2="200" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
  
  <!-- Right side - Physical world (purple) -->
  <rect x="420" y="120" width="120" height="100" rx="8" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <rect x="440" y="140" width="80" height="60" rx="4" fill="#a855f7" opacity="0.15"/>
  <circle cx="480" cy="170" r="15" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Robot arm -->
  <rect x="560" y="160" width="80" height="10" rx="3" fill="#a855f7" opacity="0.5"/>
  <circle cx="640" cy="165" r="12" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.7"/>
  
  <!-- Bridge between worlds - NVIDIA green -->
  <line x1="280" y1="180" x2="420" y2="170" stroke="#76b900" stroke-width="3" filter="url(#glow)" opacity="0.9"/>
  <line x1="280" y1="180" x2="420" y2="170" stroke="#76b900" stroke-width="6" filter="url(#softGlow)" opacity="0.4"/>
  
  <!-- Center NVIDIA logo area -->
  <rect x="310" y="155" width="90" height="36" rx="6" fill="#76b900" opacity="0.15"/>
  <text x="355" y="180" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#76b900" text-anchor="middle" filter="url(#glow)">NVIDIA</text>
  
  <!-- Particles flowing on bridge -->
  <circle cx="320" cy="178" r="3" fill="#76b900" filter="url(#glow)"/>
  <circle cx="350" cy="176" r="3" fill="#76b900" filter="url(#glow)"/>
  <circle cx="380" cy="174" r="3" fill="#76b900" filter="url(#glow)"/>
  
  <!-- Bottom labels -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="14" fill="#00ffff" text-anchor="middle" opacity="0.8">虚拟世界 (数字孪生)</text>
  <text x="540" y="30" font-family="Arial, sans-serif" font-size="14" fill="#c084fc" text-anchor="middle" opacity="0.8">物理世界 (机器人/仿真)</text>
  
  <!-- Title area bottom -->
  <rect x="0" y="300" width="800" height="100" fill="rgba(0,0,0,0.5)"/>
  <text x="400" y="338" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#76b900" text-anchor="middle">NVIDIA Cosmos 世界模型平台</text>
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="16" fill="#aaaacc" text-anchor="middle">让虚拟世界和物理世界在GPU上无缝交汇</text>
</svg>