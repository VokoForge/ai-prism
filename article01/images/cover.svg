<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- Background glow -->
  <circle cx="450" cy="250" r="200" fill="url(#glowGrad)"/>
  
  <!-- Central brain node -->
  <circle cx="450" cy="220" r="60" fill="#16213e" stroke="#00d9ff" stroke-width="3" filter="url(#glow)"/>
  <text x="450" y="215" text-anchor="middle" fill="#00d9ff" font-size="14" font-family="sans-serif" font-weight="bold">AI Agent</text>
  <text x="450" y="232" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">Superpowers</text>
  
  <!-- Skill nodes around brain -->
  <g filter="url(#glow)">
    <circle cx="280" cy="140" r="35" fill="#16213e" stroke="#e94560" stroke-width="2"/>
    <text x="280" y="136" text-anchor="middle" fill="#e94560" font-size="9" font-family="sans-serif">代码探索</text>
    <text x="280" y="148" text-anchor="middle" fill="#aaa" font-size="8" font-family="sans-serif">Explore</text>
    <line x1="310" y1="155" x2="395" y2="195" stroke="#e94560" stroke-width="1.5" opacity="0.6"/>
    
    <circle cx="620" cy="140" r="35" fill="#16213e" stroke="#ffd700" stroke-width="2"/>
    <text x="620" y="136" text-anchor="middle" fill="#ffd700" font-size="9" font-family="sans-serif">任务分解</text>
    <text x="620" y="148" text-anchor="middle" fill="#aaa" font-size="8" font-family="sans-serif">Decompose</text>
    <line x1="590" y1="155" x2="505" y2="195" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
    
    <circle cx="220" cy="280" r="35" fill="#16213e" stroke="#00ff88" stroke-width="2"/>
    <text x="220" y="276" text-anchor="middle" fill="#00ff88" font-size="9" font-family="sans-serif">多步推理</text>
    <text x="220" y="288" text-anchor="middle" fill="#aaa" font-size="8" font-family="sans-serif">Reasoning</text>
    <line x1="250" y1="265" x2="395" y2="235" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
    
    <circle cx="680" cy="280" r="35" fill="#16213e" stroke="#a855f7" stroke-width="2"/>
    <text x="680" y="276" text-anchor="middle" fill="#a855f7" font-size="9" font-family="sans-serif">工具调用</text>
    <text x="680" y="288" text-anchor="middle" fill="#aaa" font-size="8" font-family="sans-serif">Tools</text>
    <line x1="650" y1="265" x2="505" y2="235" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    
    <circle cx="350" cy="360" r="35" fill="#16213e" stroke="#ff6b6b" stroke-width="2"/>
    <text x="350" y="356" text-anchor="middle" fill="#ff6b6b" font-size="9" font-family="sans-serif">记忆管理</text>
    <text x="350" y="368" text-anchor="middle" fill="#aaa" font-size="8" font-family="sans-serif">Memory</text>
    <line x1="370" y1="330" x2="420" y2="270" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>
    
    <circle cx="550" cy="360" r="35" fill="#16213e" stroke="#00d9ff" stroke-width="2"/>
    <text x="550" y="356" text-anchor="middle" fill="#00d9ff" font-size="9" font-family="sans-serif">安全执行</text>
    <text x="550" y="368" text-anchor="middle" fill="#aaa" font-size="8" font-family="sans-serif">Sandbox</text>
    <line x1="530" y1="330" x2="480" y2="270" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Title -->
  <text x="450" y="440" text-anchor="middle" fill="#fff" font-size="28" font-family="sans-serif" font-weight="bold" filter="url(#glow)">Superpowers</text>
  <text x="450" y="470" text-anchor="middle" fill="#00d9ff" font-size="16" font-family="sans-serif">AI Agent 技能框架 | 22.6K Star</text>
</svg>