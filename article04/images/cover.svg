<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- 背景网格 -->
  <g stroke="#1a3a5c" stroke-width="1" opacity="0.3">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- 背景装饰圆 -->
  <circle cx="200" cy="150" r="80" fill="#00ff88" opacity="0.05"/>
  <circle cx="1100" cy="580" r="120" fill="#00ff88" opacity="0.05"/>
  <circle cx="640" cy="360" r="200" fill="#00ff88" opacity="0.03"/>

  <!-- 巨大的Token（左侧，被压缩前） -->
  <g transform="translate(280, 360)">
    <ellipse cx="0" cy="0" rx="140" ry="70" fill="none" stroke="#2a5a8a" stroke-width="3" opacity="0.6"/>
    <ellipse cx="0" cy="-30" rx="140" ry="70" fill="none" stroke="#3a7ab8" stroke-width="2" opacity="0.4"/>
    <ellipse cx="0" cy="-60" rx="140" ry="70" fill="none" stroke="#4a9ad8" stroke-width="2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="140" ry="70" fill="#0d2a4a" opacity="0.8"/>
    <text x="0" y="10" text-anchor="middle" fill="#6ab0e8" font-family="monospace" font-size="28" font-weight="bold">TOKEN</text>
    <text x="0" y="40" text-anchor="middle" fill="#4a8ab8" font-family="monospace" font-size="14">10240 chars</text>
  </g>

  <!-- 压缩箭头 -->
  <g transform="translate(640, 360)">
    <path d="M-120,-20 L-40,-20 L-50,-40 L0,0 L-50,40 L-40,20 L-120,20 Z" fill="url(#neonGrad)" filter="url(#strongGlow)"/>
    <path d="M40,-20 L120,-20 L110,-40 L160,0 L110,40 L120,20 L40,20 Z" fill="url(#neonGrad)" filter="url(#strongGlow)"/>
    <text x="0" y="-50" text-anchor="middle" fill="#00ff88" font-family="sans-serif" font-size="20" font-weight="bold" filter="url(#glow)">COMPRESS</text>
    <text x="0" y="60" text-anchor="middle" fill="#00ff88" font-family="sans-serif" font-size="16" filter="url(#glow)">-95%</text>
  </g>

  <!-- 压缩后的小盒子（右侧） -->
  <g transform="translate(1000, 360)">
    <rect x="-60" y="-50" width="120" height="100" rx="12" fill="#0d2a4a" stroke="#00ff88" stroke-width="3" filter="url(#glow)"/>
    <rect x="-50" y="-40" width="100" height="80" rx="8" fill="#0a1f3a" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="18" font-weight="bold">512</text>
    <text x="0" y="25" text-anchor="middle" fill="#4a8ab8" font-family="monospace" font-size="10">chars</text>
    <!-- 盒子上的节省标记 -->
    <circle cx="45" cy="-45" r="12" fill="#00ff88" opacity="0.9"/>
    <text x="45" y="-41" text-anchor="middle" fill="#0a1628" font-family="sans-serif" font-size="14" font-weight="bold">$</text>
  </g>

  <!-- 美元符号装饰 -->
  <g fill="#00ff88" opacity="0.7" filter="url(#glow)">
    <text x="150" y="200" font-family="sans-serif" font-size="36" font-weight="bold">$</text>
    <text x="180" y="550" font-family="sans-serif" font-size="28" font-weight="bold">$</text>
    <text x="1050" y="180" font-family="sans-serif" font-size="32" font-weight="bold">$</text>
    <text x="1100" y="500" font-family="sans-serif" font-size="24" font-weight="bold">$</text>
    <text x="80" y="400" font-family="sans-serif" font-size="20" font-weight="bold">$</text>
    <text x="1180" y="350" font-family="sans-serif" font-size="26" font-weight="bold">$</text>
  </g>

  <!-- 节省箭头 -->
  <g>
    <path d="M200,280 Q300,200 450,250" fill="none" stroke="#00ff88" stroke-width="3" opacity="0.6" marker-end="url(#arrowhead)"/>
    <path d="M850,280 Q950,200 1050,250" fill="none" stroke="#00ff88" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- 标题文字 -->
  <text x="640" y="650" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="48" font-weight="bold" filter="url(#glow)">Headroom</text>
  <text x="640" y="690" text-anchor="middle" fill="#00ff88" font-family="sans-serif" font-size="22" font-weight="bold" filter="url(#glow)">Token压缩降本神器 · Netflix出品</text>

  <!-- 星星标记 -->
  <g transform="translate(640, 80)">
    <text x="0" y="0" text-anchor="middle" fill="#ffd700" font-family="sans-serif" font-size="20" filter="url(#glow)">⭐ 26K+ Stars</text>
  </g>
</svg>