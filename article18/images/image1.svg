<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Stressed PM figure -->
  <circle cx="160" cy="160" r="35" fill="#e94560" opacity="0.8"/>
  <text x="160" y="165" text-anchor="middle" fill="#fff" font-size="28" font-family="sans-serif">😫</text>
  <text x="160" y="220" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold" font-family="sans-serif">产品经理</text>

  <!-- Scattered tools -->
  <rect x="280" y="60" width="90" height="45" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="325" y="88" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif">需求文档</text>

  <rect x="400" y="110" width="90" height="45" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="445" y="138" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif">竞品分析</text>

  <rect x="520" y="60" width="90" height="45" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="565" y="88" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif">用户调研</text>

  <rect x="340" y="170" width="90" height="45" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="385" y="198" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif">原型设计</text>

  <rect x="460" y="170" width="90" height="45" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="505" y="198" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif">数据分析</text>

  <rect x="580" y="170" width="90" height="45" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="625" y="198" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif">项目规划</text>

  <rect x="400" y="240" width="90" height="45" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="445" y="268" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif">汇报PPT</text>

  <rect x="520" y="240" width="90" height="45" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="565" y="268" text-anchor="middle" fill="#e94560" font-size="12" font-family="sans-serif">A/B测试</text>

  <!-- Chaos lines -->
  <g stroke="#e94560" stroke-width="1.5" stroke-dasharray="5,5" fill="none" opacity="0.4">
    <line x1="190" y1="145" x2="280" y2="85"/>
    <line x1="190" y1="165" x2="340" y2="195"/>
    <line x1="190" y1="155" x2="400" y2="130"/>
    <line x1="190" y1="170" x2="520" y2="85"/>
    <line x1="190" y1="160" x2="580" y2="195"/>
    <line x1="190" y1="175" x2="620" y2="85"/>
    <line x1="190" y1="180" x2="520" y2="265"/>
  </g>

  <!-- Question marks -->
  <text x="660" y="130" text-anchor="middle" fill="#e94560" font-size="36" font-family="sans-serif" opacity="0.6">?</text>
  <text x="700" y="200" text-anchor="middle" fill="#e94560" font-size="28" font-family="sans-serif" opacity="0.4">?</text>
  <text x="630" y="260" text-anchor="middle" fill="#e94560" font-size="32" font-family="sans-serif" opacity="0.5">?</text>

  <!-- Bottom text -->
  <text x="400" y="360" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif" opacity="0.7">工具碎片化 · 效率低下 · 重复劳动</text>
</svg>