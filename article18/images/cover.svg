<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="node4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="node5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="100%" style="stop-color:#ee0979"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Connection lines -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="2" fill="none">
    <line x1="450" y1="250" x2="130" y2="100"/>
    <line x1="450" y1="250" x2="130" y2="400"/>
    <line x1="450" y1="250" x2="770" y2="100"/>
    <line x1="450" y1="250" x2="770" y2="400"/>
    <line x1="450" y1="250" x2="250" y2="430"/>
    <line x1="450" y1="250" x2="650" y2="430"/>
    <line x1="450" y1="250" x2="250" y2="70"/>
    <line x1="450" y1="250" x2="650" y2="70"/>
    <line x1="130" y1="100" x2="250" y2="70"/>
    <line x1="130" y1="100" x2="130" y2="400"/>
    <line x1="770" y1="100" x2="650" y2="70"/>
    <line x1="770" y1="100" x2="770" y2="400"/>
    <line x1="130" y1="400" x2="250" y2="430"/>
    <line x1="770" y1="400" x2="650" y2="430"/>
  </g>

  <!-- Center node -->
  <circle cx="450" cy="250" r="55" fill="url(#center)" filter="url(#glow)" opacity="0.9"/>
  <text x="450" y="242" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="sans-serif">产品</text>
  <text x="450" y="260" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="sans-serif">经理</text>

  <!-- Node 1 - Discovery -->
  <circle cx="130" cy="100" r="42" fill="url(#node1)" filter="url(#glow)" opacity="0.85"/>
  <text x="130" y="97" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">发现</text>
  <text x="130" y="113" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif">25技能</text>

  <!-- Node 2 - Strategy -->
  <circle cx="250" cy="70" r="38" fill="url(#node2)" filter="url(#glow)" opacity="0.85"/>
  <text x="250" y="67" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">策略</text>
  <text x="250" y="83" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif">20技能</text>

  <!-- Node 3 - Execution -->
  <circle cx="650" cy="70" r="38" fill="url(#node3)" filter="url(#glow)" opacity="0.85"/>
  <text x="650" y="67" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">执行</text>
  <text x="650" y="83" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif">30技能</text>

  <!-- Node 4 - Launch -->
  <circle cx="770" cy="100" r="42" fill="url(#node4)" filter="url(#glow)" opacity="0.85"/>
  <text x="770" y="97" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">上线</text>
  <text x="770" y="113" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif">15技能</text>

  <!-- Node 5 - Growth -->
  <circle cx="770" cy="400" r="38" fill="url(#node5)" filter="url(#glow)" opacity="0.85"/>
  <text x="770" y="397" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">增长</text>
  <text x="770" y="413" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif">20技能</text>

  <!-- Node 6 - Analysis -->
  <circle cx="650" cy="430" r="35" fill="url(#node1)" filter="url(#glow)" opacity="0.85"/>
  <text x="650" y="427" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">分析</text>
  <text x="650" y="443" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif">18技能</text>

  <!-- Node 7 - Research -->
  <circle cx="250" cy="430" r="35" fill="url(#node2)" filter="url(#glow)" opacity="0.85"/>
  <text x="250" y="427" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">调研</text>
  <text x="250" y="443" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif">15技能</text>

  <!-- Node 8 - Design -->
  <circle cx="130" cy="400" r="38" fill="url(#node3)" filter="url(#glow)" opacity="0.85"/>
  <text x="130" y="397" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">设计</text>
  <text x="130" y="413" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif">12技能</text>

  <!-- Title -->
  <text x="450" y="470" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif" opacity="0.7">PM-Skills · 产品经理AI技能市场</text>
</svg>