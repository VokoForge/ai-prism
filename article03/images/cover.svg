<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- Central developer figure -->
  <g transform="translate(450, 240)" filter="url(#glow)">
    <circle cx="0" cy="-30" r="35" fill="#16213e" stroke="#ffd700" stroke-width="3"/>
    <text x="0" y="-25" text-anchor="middle" fill="#ffd700" font-size="20" font-family="sans-serif">👨‍💻</text>
    
    <!-- 7 skill orbs -->
    <g>
      <circle cx="-140" cy="-80" r="30" fill="#16213e" stroke="#e94560" stroke-width="2"/>
      <text x="-140" y="-76" text-anchor="middle" fill="#e94560" font-size="8" font-family="sans-serif">/review</text>
      <text x="-140" y="-65" text-anchor="middle" fill="#aaa" font-size="7" font-family="sans-serif">代码审查</text>
      <line x1="-112" y1="-65" x2="-28" y2="-45" stroke="#e94560" stroke-width="1.5" opacity="0.5"/>
    </g>
    
    <g>
      <circle cx="0" cy="-130" r="30" fill="#16213e" stroke="#00d9ff" stroke-width="2"/>
      <text x="0" y="-126" text-anchor="middle" fill="#00d9ff" font-size="8" font-family="sans-serif">/test</text>
      <text x="0" y="-115" text-anchor="middle" fill="#aaa" font-size="7" font-family="sans-serif">测试</text>
      <line x1="0" y1="-100" x2="0" y2="-62" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
    </g>
    
    <g>
      <circle cx="140" cy="-80" r="30" fill="#16213e" stroke="#00ff88" stroke-width="2"/>
      <text x="140" y="-76" text-anchor="middle" fill="#00ff88" font-size="8" font-family="sans-serif">/refactor</text>
      <text x="140" y="-65" text-anchor="middle" fill="#aaa" font-size="7" font-family="sans-serif">重构</text>
      <line x1="112" y1="-65" x2="28" y2="-45" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
    </g>
    
    <g>
      <circle cx="-160" cy="40" r="30" fill="#16213e" stroke="#a855f7" stroke-width="2"/>
      <text x="-160" y="44" text-anchor="middle" fill="#a855f7" font-size="8" font-family="sans-serif">/optimize</text>
      <text x="-160" y="55" text-anchor="middle" fill="#aaa" font-size="7" font-family="sans-serif">性能优化</text>
      <line x1="-132" y1="40" x2="-28" y2="-15" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
    </g>
    
    <g>
      <circle cx="160" cy="40" r="30" fill="#16213e" stroke="#ff6b6b" stroke-width="2"/>
      <text x="160" y="44" text-anchor="middle" fill="#ff6b6b" font-size="8" font-family="sans-serif">/security</text>
      <text x="160" y="55" text-anchor="middle" fill="#aaa" font-size="7" font-family="sans-serif">安全审计</text>
      <line x1="132" y1="40" x2="28" y2="-15" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
    </g>
    
    <g>
      <circle cx="-80" cy="110" r="30" fill="#16213e" stroke="#ffd700" stroke-width="2"/>
      <text x="-80" y="114" text-anchor="middle" fill="#ffd700" font-size="8" font-family="sans-serif">/docs</text>
      <text x="-80" y="125" text-anchor="middle" fill="#aaa" font-size="7" font-family="sans-serif">文档</text>
      <line x1="-55" y1="85" x2="-15" y2="0" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
    </g>
    
    <g>
      <circle cx="80" cy="110" r="30" fill="#16213e" stroke="#00d9ff" stroke-width="2"/>
      <text x="80" y="114" text-anchor="middle" fill="#00d9ff" font-size="8" font-family="sans-serif">/deploy</text>
      <text x="80" y="125" text-anchor="middle" fill="#aaa" font-size="7" font-family="sans-serif">部署</text>
      <line x1="55" y1="85" x2="15" y2="0" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="450" y="430" text-anchor="middle" fill="#fff" font-size="26" font-family="sans-serif" font-weight="bold" filter="url(#glow)">Agent Skills</text>
  <text x="450" y="460" text-anchor="middle" fill="#ffd700" font-size="15" font-family="sans-serif">Google Chrome 团队出品 | 5.8万 Star</text>
</svg>