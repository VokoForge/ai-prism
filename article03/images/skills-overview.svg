<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skill1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skill2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skill3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skill4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skill5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skill6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skill7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc">agent-skills 7大核心命令</text>
  <text x="400" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">覆盖完整开发周期的生产级工程技能</text>

  <!-- Center: Developer -->
  <g transform="translate(400, 250)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3" filter="url(#glow)">
      <animate attributeName="r" values="85;95;85" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="65" fill="url(#centerGrad)" filter="url(#strongGlow)"/>
    <!-- Developer icon -->
    <text x="0" y="-10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="white">&#128187;</text>
    <text x="0" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Developer</text>
  </g>

  <!-- Skill 1: /review (top-left) -->
  <g transform="translate(180, 130)">
    <rect x="-75" y="-30" width="150" height="60" rx="12" fill="url(#skill1)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">/review</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">代码审查</text>
    <!-- Connection line -->
    <line x1="75" y1="0" x2="155" y2="105" stroke="#ef4444" stroke-width="2" opacity="0.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Skill 2: /test (top) -->
  <g transform="translate(400, 100)">
    <rect x="-75" y="-30" width="150" height="60" rx="12" fill="url(#skill2)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">/test</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">测试生成</text>
    <!-- Connection line -->
    <line x1="0" y1="30" x2="0" y2="85" stroke="#3b82f6" stroke-width="2" opacity="0.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Skill 3: /refactor (top-right) -->
  <g transform="translate(620, 130)">
    <rect x="-75" y="-30" width="150" height="60" rx="12" fill="url(#skill3)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">/refactor</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">重构建议</text>
    <!-- Connection line -->
    <line x1="-75" y1="0" x2="-155" y2="105" stroke="#10b981" stroke-width="2" opacity="0.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Skill 4: /security (right) -->
  <g transform="translate(680, 250)">
    <rect x="-75" y="-30" width="150" height="60" rx="12" fill="url(#skill4)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">/security</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">安全扫描</text>
    <!-- Connection line -->
    <line x1="-75" y1="0" x2="-145" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Skill 5: /perf (bottom-right) -->
  <g transform="translate(620, 370)">
    <rect x="-75" y="-30" width="150" height="60" rx="12" fill="url(#skill5)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">/perf</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">性能分析</text>
    <!-- Connection line -->
    <line x1="-75" y1="0" x2="-155" y2="-105" stroke="#06b6d4" stroke-width="2" opacity="0.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Skill 6: /docs (bottom) -->
  <g transform="translate(400, 400)">
    <rect x="-75" y="-30" width="150" height="60" rx="12" fill="url(#skill6)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">/docs</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">文档生成</text>
    <!-- Connection line -->
    <line x1="0" y1="-30" x2="0" y2="-85" stroke="#ec4899" stroke-width="2" opacity="0.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Skill 7: /arch (bottom-left) -->
  <g transform="translate(180, 370)">
    <rect x="-75" y="-30" width="150" height="60" rx="12" fill="url(#skill7)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">/arch</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">架构评估</text>
    <!-- Connection line -->
    <line x1="75" y1="0" x2="155" y2="-105" stroke="#f97316" stroke-width="2" opacity="0.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Left side: /security mirror (left) -->
  <g transform="translate(120, 250)">
    <rect x="-75" y="-30" width="150" height="60" rx="12" fill="url(#skill4)" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">/security</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">安全扫描</text>
    <!-- Connection line -->
    <line x1="75" y1="0" x2="145" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Decorative floating dots -->
  <circle cx="80" cy="80" r="4" fill="#ef4444" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="420" r="5" fill="#3b82f6" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="100" r="3" fill="#10b981" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="400" r="4" fill="#f59e0b" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Legend at bottom -->
  <g transform="translate(400, 470)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Addy Osmani 出品 | Google Chrome 团队 | 5.8万+ Star</text>
  </g>
</svg>